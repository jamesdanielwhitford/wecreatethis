name = "symbolic-ritual"
main = "index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "symbolic-ritual"
database_id = "REPLACE_WITH_D1_ID"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "symbolic-ritual-media"

[vars]
# AUTH_TOKEN is set as a secret via: npx wrangler secret put AUTH_TOKEN
# Do not put the real token here.
