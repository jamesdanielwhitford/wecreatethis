name = "symbolic-ritual"
main = "index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "symbolic-ritual"
database_id = "db7a0556-a35f-4835-a6cd-dadae870a9e9"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "symbolic-ritual-media"

[vars]
# AUTH_TOKEN is set as a secret via: npx wrangler secret put AUTH_TOKEN
# Do not put the real token here.
# R2_PUBLIC_URL is the public base URL for the R2 bucket.
# Set this after enabling public access on the bucket in the Cloudflare dashboard.
# Example: https://pub-abc123.r2.dev  or  https://media.yourdomain.com
R2_PUBLIC_URL = "https://media.wecreatethis.com"
