<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Symbolic Ritual">
  <title>Symbolic Ritual</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: Canvas;
      color: CanvasText;
      color-scheme: light dark;
      min-height: 100dvh;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Each blog item occupies its own viewport slot. CSS handles centering and the
       minimum gap, so layout is stable from first paint — no JS measurement needed. */
    .item {
      width: 100%;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 12.5svh;
    }

    figure {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }

    /* Media: fills screen up to natural dimensions, never exceeds viewport.
       width/height HTML attributes give the browser an aspect ratio so it reserves
       correctly-sized space before the image bytes arrive — no layout shift on load. */
    .item-media {
      display: block;
      max-width: 100%;
      max-height: 100dvh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    video.item-media {
      background-color: #000;
    }

    /* Metadata sits directly below media */
    figcaption {
      width: 100%;
      max-width: 640px;
      padding: 0.75rem 1rem 0;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .meta-datetime,
    .meta-coords {
      font-size: 0.8125rem;
      opacity: 0.7;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }

    a.meta-coords {
      color: LinkText;
      text-decoration: underline;
    }

    .meta-caption {
      margin-top: 0.6rem;
      font-size: 1rem;
      line-height: 1.55;
      max-width: 60ch;
    }

    /* Metadata legibility */
    .meta-datetime,
    .meta-coords {
      line-height: 1.5;
    }

    /* Sentinel for infinite scroll — invisible */
    #scroll-sentinel {
      height: 1px;
      width: 100%;
    }

    /* Loading pulse */
    .loading-pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.25;
      margin: 40dvh auto;
      animation: pulse 1.2s ease-in-out infinite;
      contain: layout style paint;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.15; transform: scale(0.8); }
      50%       { opacity: 0.45; transform: scale(1.2); }
    }

    /* Empty and offline states */
    .feed-message {
      margin: 40dvh auto;
      font-size: 0.8125rem;
      opacity: 0.35;
      text-align: center;
      padding: 0 1rem;
    }

    /* Offline indicator — fixed, unobtrusive */
    #offline-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      opacity: 0.6;
      text-align: center;
      background: Canvas;
      border-top: 1px solid currentColor;
      display: none;
    }

    #offline-bar.visible { display: block; }

    /* Broken image placeholder */
    .item-media-error {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 4 / 3;
      max-height: 100dvh;
      opacity: 0.15;
      font-size: 0.8125rem;
    }

    /* Reduced motion: disable scroll-driven transitions */
    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; }
      .loading-pulse { animation: none; opacity: 0.3; }
    }
  </style>
</head>
<body>
  <a href="#feed" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Skip to content</a>
  <main id="feed" aria-label="Media feed">
    <div id="scroll-sentinel" aria-hidden="true"></div>
  </main>
  <div id="offline-bar" aria-live="polite">Offline — showing cached content</div>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/symbolicritual/sw.js');
    }
  </script>
</body>
</html>
