<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050a05">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Starry Night">
  <title>Starry Night</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar">
    <a id="backLink" class="back-link hidden" href="week.html">← Week</a>
    <span class="navbar-title">Starry Night</span>
    <span class="navbar-location" id="locationName">Locating…</span>
  </nav>

  <div id="toast" class="toast"></div>

  <!-- Stale data banner -->
  <div class="stale-banner hidden" id="staleBanner">
    <div class="stale-banner-inner">Using cached weather — data may be outdated</div>
  </div>

  <!-- Date header (shown when viewing a specific date from week page) -->
  <div class="date-header hidden" id="dateHeader"></div>

  <!-- Location search (shown if geolocation unavailable) -->
  <div class="location-section hidden" id="locationSection">
    <form class="location-form" id="locationForm">
      <input class="location-input" id="cityInput" type="text" placeholder="Enter city name…" autocomplete="off">
      <button class="btn" type="submit">Go</button>
    </form>
    <div class="location-hint">Enter a city to see skywatching conditions</div>
  </div>

  <!-- Skywatching Score -->
  <div class="score-section">
    <div class="score-value" id="scoreValue" style="color: var(--text-muted)">—</div>
    <div class="score-label" id="scoreLabel">Skywatching Score</div>
    <div class="score-subtitle" id="scoreSubtitle" style="color: var(--text-muted)">Loading…</div>
  </div>

  <div class="container">

    <!-- Conditions Card -->
    <div class="card" id="conditionsCard">
      <div class="card-title">Tonight's Conditions</div>
      <div class="conditions-grid">
        <div class="condition-item">
          <div class="condition-label">Cloud Cover</div>
          <div class="skeleton" style="height:32px;width:60%;margin-top:4px"></div>
        </div>
        <div class="condition-item">
          <div class="condition-label">Rain Chance</div>
          <div class="skeleton" style="height:32px;width:60%;margin-top:4px"></div>
        </div>
      </div>
    </div>

    <!-- Sun & Moon Card -->
    <div class="card" id="sunMoonCard">
      <div class="card-title">Sun &amp; Moon</div>
      <div class="sun-moon-grid">
        <div class="sun-moon-item">
          <div class="sun-moon-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Sunrise</div>
          <div class="skeleton" style="height:22px;width:70%;margin-top:4px"></div>
        </div>
        <div class="sun-moon-item">
          <div class="sun-moon-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Sunset</div>
          <div class="skeleton" style="height:22px;width:70%;margin-top:4px"></div>
        </div>
        <div class="sun-moon-item">
          <div class="sun-moon-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Moonrise</div>
          <div class="skeleton" style="height:22px;width:70%;margin-top:4px"></div>
        </div>
        <div class="sun-moon-item">
          <div class="sun-moon-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Moonset</div>
          <div class="skeleton" style="height:22px;width:70%;margin-top:4px"></div>
        </div>
      </div>
    </div>

    <!-- Planets -->
    <div class="section-title" style="margin-top:4px">Planets Tonight</div>
    <div id="planetsList">
      <div class="planet-item">
        <div class="planet-symbol"><div class="skeleton" style="width:28px;height:28px;border-radius:50%"></div></div>
        <div class="planet-info">
          <div class="skeleton" style="height:16px;width:60%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:80%"></div>
        </div>
      </div>
      <div class="planet-item">
        <div class="planet-symbol"><div class="skeleton" style="width:28px;height:28px;border-radius:50%"></div></div>
        <div class="planet-info">
          <div class="skeleton" style="height:16px;width:50%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:70%"></div>
        </div>
      </div>
    </div>

  </div><!-- .container -->

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item active">
      <svg class="bottom-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      Tonight
    </a>
    <a href="week.html" class="bottom-nav-item">
      <svg class="bottom-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Week
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
  <script src="astronomy.js"></script>
  <script src="weather.js"></script>
  <script src="app.js"></script>
</body>
</html>
