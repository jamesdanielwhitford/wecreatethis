<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chess Timer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: inherit;
    }

    :root {
      --orange: #FF9200;
      --orange-text: #FFFAEE;
      --grey-button: #404040;
      --background: #1E1E1E;
      --text-primary: #F8F8F8;
      --red-light: #EC6765;
      --red-dark: #773432;
      --yellow-light: #F2CA44;
      --yellow-dark: #7A6522;
      --green-light: #4CD964;
      --green-dark: #2A7A36;
    }

    html {
      height: 100%;
    }
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--background);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100dvh;
      display: none;
      flex-direction: column;
      background: var(--background);
    }
    .screen.active {
      display: flex;
    }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      overflow-y: auto;
      padding: 0 0 32px;
    }

    .setup-header {
      padding: 56px 24px 24px;
      text-align: left;
    }
    .setup-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .setup-section {
      padding: 0 20px 24px;
    }
    .setup-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    /* Time picker drum roll */
    .time-picker-row {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--background);
      border-radius: 16px;
      padding: 12px 12px;
      margin-bottom: 12px;
      position: relative;
    }

    /* selection highlight bar */
    .time-picker-row::after {
      content: '';
      position: absolute;
      left: 12px;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      height: 52px;
      background: #3a3a3a;
      border-radius: 10px;
      pointer-events: none;
    }

    .drum-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
      overflow: hidden;
      height: 156px; /* 3 items × 52px */
      cursor: ns-resize;
      touch-action: none;
    }

    .drum-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      will-change: transform;
    }

    .drum-item {
      height: 52px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #555;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .drum-item.selected {
      color: var(--text-primary);
    }

    .drum-unit {
      font-size: 13px;
      font-weight: 500;
      color: #888;
      position: absolute;
      left: calc(50% + 28px);
      white-space: nowrap;
    }

    /* fade top and bottom */
    .drum-col::before,
    .drum-col::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 52px;
      pointer-events: none;
      z-index: 2;
    }
    .drum-col::before {
      top: 0;
      background: linear-gradient(to bottom, #1E1E1E, transparent);
    }
    .drum-col::after {
      bottom: 0;
      background: linear-gradient(to top, #1E1E1E, transparent);
    }

    .time-separator {
      align-self: center;
      flex-shrink: 0;
      z-index: 3;
      margin-bottom: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      text-transform: lowercase;
      letter-spacing: 0.3px;
    }

    .start-btn {
      width: 100%;
      padding: 18px;
      background: var(--orange);
      border: none;
      border-radius: 22px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.08s;
    }
    .start-btn:active {
      filter: brightness(0.88);
    }

    /* Previous timers list */
    .timer-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .timer-list-empty {
      color: #555;
      font-size: 15px;
      text-align: center;
      padding: 24px 0;
    }
    .timer-item {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }
    .timer-item-tap {
      flex: 1;
      padding: 18px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #2a2a2a;
      border-radius: 14px;
    }
    .timer-item-tap:active {
      background: #333;
    }
    .timer-item-label {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .timer-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .timer-item-play,
    .timer-item-delete {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: filter 0.08s;
    }
    .timer-item-play {
      background: var(--green-light);
      color: var(--green-dark);
    }
    .timer-item-play:active {
      filter: brightness(0.88);
    }
    .timer-item-delete {
      background: var(--red-light);
      color: var(--red-dark);
    }
    .timer-item-delete:active {
      filter: brightness(0.88);
    }

    /* ── READY SCREEN ── */
    #ready-screen {
      flex-direction: column;
    }

    .ready-half {
      flex: 1;
      min-height: 0;
      cursor: pointer;
      background: var(--green-light);
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: filter 0.08s;
    }
    .ready-half:active {
      filter: brightness(0.92);
    }
    .ready-half.top {
      transform: rotate(180deg);
      margin: 8px 8px 0;
    }
    .ready-half.bottom {
      margin: 0 8px 8px;
    }

    .ready-start-time {
      font-size: 84px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      display: flex;
      align-items: center;
    }
    .ready-start-label {
      position: absolute;
      top: calc(50% + 44px);
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.3px;
    }

    /* center bar between player halves */
    .center-bar {
      flex-shrink: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      z-index: 30;
    }
    #ready-screen .center-bar {
      justify-content: flex-start;
    }

    /* small action buttons (cancel, pause) */
    .action-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
      transition: transform 0.08s;
    }
    .action-btn:active {
      transform: scale(0.92);
    }
    .cancel-btn {
      background: var(--red-light);
      color: var(--red-dark);
    }
    .pause-btn {
      background: var(--yellow-light);
      color: var(--yellow-dark);
      gap: 5px;
    }
    .pause-btn::before,
    .pause-btn::after {
      content: '';
      display: block;
      width: 4px;
      height: 16px;
      border-radius: 2px;
      background: var(--yellow-dark);
    }
    .resume-btn {
      background: var(--green-light);
      color: var(--green-dark);
    }
    .resume-btn::before {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 8px 0 8px 14px;
      border-color: transparent transparent transparent var(--green-dark);
      margin-left: 3px;
    }

    /* ── ACTIVE TIMER SCREEN ── */
    #timer-screen {
      position: relative;
      overflow: hidden;
    }

    .player-panel {
      flex: 1;
      min-height: 0;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .player-panel.top {
      transform: rotate(180deg);
      margin: 8px 8px 0;
    }
    .player-panel.bottom {
      margin: 0 8px 8px;
    }
    .player-panel.active-player {
      background: var(--orange);
    }
    .player-panel.inactive-player {
      background: var(--grey-button);
    }

    .player-time {
      font-size: 84px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      display: flex;
      align-items: center;
    }

    .time-colon {
      display: inline-block;
      position: relative;
      top: -6px;
      letter-spacing: 0;
      margin: 0 1px;
    }

    .time-seg {
      display: inline-block;
    }

    /* cancel sits at the left corner, pause at the right */
    .corner-btn-left {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      z-index: 10;
    }
    .corner-btn-right {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      z-index: 10;
    }

    /* confirm exit modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: none;
      flex-direction: column;
    }
    .modal-backdrop.visible {
      display: flex;
    }
    .modal-half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }
    .modal-half.top {
      transform: rotate(180deg);
    }
    .modal {
      background: #2a2a2a;
      border-radius: 20px;
      padding: 24px 20px 18px;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
    }
    .modal-body {
      font-size: 14px;
      color: #999;
      text-align: center;
      margin-bottom: 8px;
    }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-btn-confirm {
      background: var(--red-light);
      color: var(--red-dark);
    }
    .modal-btn-confirm:active {
      filter: brightness(0.92);
    }
    .modal-btn-cancel {
      background: #3a3a3a;
      color: var(--text-primary);
    }
    .modal-btn-cancel:active {
      background: #444;
    }

    /* paused overlay */
    .paused-overlay {
      position: absolute;
      inset: 0;
      background: rgba(30,30,30,0.6);
      z-index: 4;
      display: none;
      pointer-events: none;
    }
    .paused-overlay.visible {
      display: block;
    }
  </style>
</head>
<body>

  <!-- ── SETUP SCREEN ── -->
  <div id="setup-screen" class="screen active">
    <div class="setup-header">
      <h1>Chess Timers</h1>
    </div>

    <div class="setup-section">
<div class="time-picker-row">
        <div class="drum-col" id="drum-hours">
          <div class="drum-track" id="drum-track-hours"></div>
        </div>
        <div class="drum-col" id="drum-minutes">
          <div class="drum-track" id="drum-track-minutes"></div>
        </div>
        <div class="drum-col" id="drum-seconds">
          <div class="drum-track" id="drum-track-seconds"></div>
        </div>
      </div>
      <button class="start-btn" id="setup-start-btn">Start</button>
    </div>

    <div class="setup-section">
      <div class="setup-section-title">Previous Timers</div>
      <div class="timer-list" id="timer-list">
        <div class="timer-list-empty" id="timer-list-empty">No previous timers</div>
      </div>
    </div>
  </div>

  <!-- ── READY SCREEN ── -->
  <div id="ready-screen" class="screen">
    <button class="ready-half top" id="ready-start-btn-top">
      <div class="ready-start-time" id="ready-display-time-top">5:00</div>
      <div class="ready-start-label">Press to start</div>
    </button>

    <div class="center-bar">
      <button class="action-btn cancel-btn" id="ready-cancel-btn" title="Cancel">&#x2715;</button>
    </div>

    <button class="ready-half bottom" id="ready-start-btn-bottom">
      <div class="ready-start-time" id="ready-display-time-bottom">5:00</div>
      <div class="ready-start-label">Press to start</div>
    </button>
  </div>

  <!-- ── ACTIVE TIMER SCREEN ── -->
  <div id="timer-screen" class="screen">
    <div class="player-panel top inactive-player" id="player-top-panel">
      <div class="player-time" id="player-top-time">5:00</div>
    </div>

    <div class="center-bar">
      <button class="action-btn cancel-btn" id="timer-cancel-btn" title="Cancel">&#x2715;</button>
      <button class="action-btn pause-btn" id="pause-btn" title="Pause"></button>
    </div>

    <div class="paused-overlay" id="paused-overlay"></div>

    <div class="player-panel bottom active-player" id="player-bottom-panel">
      <div class="player-time" id="player-bottom-time">5:00</div>
    </div>
  </div>

  <!-- ── EXIT CONFIRM MODAL ── -->
  <div class="modal-backdrop" id="exit-modal">
    <div class="modal-half top">
      <div class="modal">
        <div class="modal-title">End Game?</div>
        <div class="modal-body">The current timer will be lost.</div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-confirm exit-confirm-btn">End Game</button>
          <button class="modal-btn modal-btn-cancel exit-cancel-btn">Keep Playing</button>
        </div>
      </div>
    </div>
    <div class="modal-half bottom">
      <div class="modal">
        <div class="modal-title">End Game?</div>
        <div class="modal-body">The current timer will be lost.</div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-confirm exit-confirm-btn">End Game</button>
          <button class="modal-btn modal-btn-cancel exit-cancel-btn">Keep Playing</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/chesstimer/sw.js');
    }
  </script>
</body>
</html>
