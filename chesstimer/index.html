<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chess Timer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    :root {
      --orange: #FF9200;
      --orange-text: #FFFAEE;
      --grey-button: #404040;
      --background: #1E1E1E;
      --text-primary: #F8F8F8;
      --red-light: #EC6765;
      --red-dark: #773432;
      --yellow-light: #F2CA44;
      --yellow-dark: #7A6522;
      --green-light: #4CD964;
      --green-dark: #2A7A36;
    }

    html {
      height: 100%;
    }
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--background);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100dvh;
      display: none;
      flex-direction: column;
      background: var(--background);
    }
    .screen.active {
      display: flex;
    }

    /* ── SETUP SCREEN ── */
    #setup-screen {
      overflow-y: auto;
      padding: 0 0 32px;
    }

    .setup-header {
      padding: 56px 24px 24px;
      text-align: center;
    }
    .setup-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .setup-section {
      padding: 0 20px 24px;
    }
    .setup-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    /* Time picker */
    .time-picker-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2a2a2a;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .time-unit {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .time-unit label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .time-unit input {
      width: 100%;
      background: #3a3a3a;
      border: none;
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      padding: 10px 4px;
      font-variant-numeric: tabular-nums;
      -webkit-appearance: none;
      outline: none;
    }
    .time-unit input:focus {
      background: #444;
    }
    .time-separator {
      font-size: 28px;
      font-weight: 700;
      color: #888;
      padding-bottom: 18px;
    }

    .start-btn {
      width: 100%;
      padding: 18px;
      background: var(--orange);
      border: none;
      border-radius: 22px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 0 #994f00;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .start-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #994f00;
    }

    /* Previous timers list */
    .timer-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .timer-list-empty {
      color: #555;
      font-size: 15px;
      text-align: center;
      padding: 24px 0;
    }
    .timer-item {
      display: flex;
      align-items: center;
      background: #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
    }
    .timer-item-tap {
      flex: 1;
      padding: 18px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .timer-item-tap:active {
      background: #333;
    }
    .timer-item-label {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .timer-item-delete {
      width: 52px;
      height: 100%;
      min-height: 60px;
      background: var(--red-light);
      border: none;
      color: var(--red-dark);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .timer-item-delete:active {
      background: var(--red-dark);
    }

    /* ── READY SCREEN ── */
    #ready-screen {
      position: relative;
    }

    .ready-player {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ready-player.top {
      transform: rotate(180deg);
    }

    .ready-btn {
      width: calc(100% - 32px);
      height: calc(100% - 32px);
      background: var(--grey-button);
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .ready-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }

    .ready-time {
      font-size: 80px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
    }

    /* The big green "press to start" button in ready screen */
    #ready-start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 32px);
      max-width: 340px;
      background: var(--green-light);
      border: none;
      border-radius: 22px;
      padding: 0;
      cursor: pointer;
      box-shadow: 0 3px 0 var(--green-dark);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 28px 24px;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    #ready-start-btn:active {
      transform: translate(-50%, calc(-50% + 2px));
      box-shadow: 0 1px 0 var(--green-dark);
    }
    .ready-start-time {
      font-size: 64px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
    }
    .ready-start-label {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.3px;
    }

    /* small action buttons (cancel, pause) */
    .action-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
      transition: transform 0.08s;
    }
    .action-btn:active {
      transform: scale(0.92);
    }
    .cancel-btn {
      background: var(--red-light);
      box-shadow: 0 3px 0 var(--red-dark);
      color: var(--red-dark);
    }
    .cancel-btn:active {
      box-shadow: 0 1px 0 var(--red-dark);
      transform: translateY(2px);
    }
    .pause-btn {
      background: var(--yellow-light);
      box-shadow: 0 3px 0 var(--yellow-dark);
      color: var(--yellow-dark);
    }
    .pause-btn:active {
      box-shadow: 0 1px 0 var(--yellow-dark);
      transform: translateY(2px);
    }
    .resume-btn {
      background: var(--green-light);
      box-shadow: 0 3px 0 var(--green-dark);
      color: #fff;
    }
    .resume-btn:active {
      box-shadow: 0 1px 0 var(--green-dark);
      transform: translateY(2px);
    }

    /* ── ACTIVE TIMER SCREEN ── */
    #timer-screen {
      position: relative;
      overflow: hidden;
    }

    .player-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .player-panel.top {
      transform: rotate(180deg);
    }

    .player-btn {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: none;
    }
    .player-btn.active-player {
      background: var(--orange);
    }
    .player-btn.inactive-player {
      background: var(--grey-button);
    }

    .player-time {
      font-size: 84px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
    }

    /* cancel sits at the left corner, pause at the right */
    .corner-btn-left {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      z-index: 10;
    }
    .corner-btn-right {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      z-index: 10;
    }

    /* paused overlay */
    .paused-overlay {
      position: absolute;
      inset: 0;
      background: rgba(30,30,30,0.6);
      z-index: 4;
      display: none;
      pointer-events: none;
    }
    .paused-overlay.visible {
      display: block;
    }
  </style>
</head>
<body>

  <!-- ── SETUP SCREEN ── -->
  <div id="setup-screen" class="screen active">
    <div class="setup-header">
      <h1>Chess Timer</h1>
    </div>

    <div class="setup-section">
      <div class="setup-section-title">Set Time</div>
      <div class="time-picker-row">
        <div class="time-unit">
          <label>min</label>
          <input type="number" id="minutes-input" min="0" max="99" value="5" inputmode="numeric">
        </div>
        <div class="time-separator">:</div>
        <div class="time-unit">
          <label>sec</label>
          <input type="number" id="seconds-input" min="0" max="59" value="0" inputmode="numeric">
        </div>
      </div>
      <button class="start-btn" id="setup-start-btn">Start</button>
    </div>

    <div class="setup-section">
      <div class="setup-section-title">Previous Timers</div>
      <div class="timer-list" id="timer-list">
        <div class="timer-list-empty" id="timer-list-empty">No previous timers</div>
      </div>
    </div>
  </div>

  <!-- ── READY SCREEN ── -->
  <div id="ready-screen" class="screen">
    <div class="ready-player top"></div>
    <div class="ready-player bottom"></div>

    <button id="ready-start-btn">
      <div class="ready-start-time" id="ready-display-time">5:00</div>
      <div class="ready-start-label">Press to start</div>
    </button>

    <div class="corner-btn-left">
      <button class="action-btn cancel-btn" id="ready-cancel-btn" title="Cancel">&#x2715;</button>
    </div>
  </div>

  <!-- ── ACTIVE TIMER SCREEN ── -->
  <div id="timer-screen" class="screen">
    <div class="player-panel top" id="player-top-panel">
      <div class="player-btn inactive-player" id="player-top-btn">
        <div class="player-time" id="player-top-time">5:00</div>
      </div>
    </div>

    <div class="paused-overlay" id="paused-overlay"></div>

    <div class="corner-btn-left">
      <button class="action-btn cancel-btn" id="timer-cancel-btn" title="Cancel">&#x2715;</button>
    </div>
    <div class="corner-btn-right">
      <button class="action-btn pause-btn" id="pause-btn" title="Pause">&#9646;&#9646;</button>
    </div>

    <div class="player-panel bottom" id="player-bottom-panel">
      <div class="player-btn active-player" id="player-bottom-btn">
        <div class="player-time" id="player-bottom-time">5:00</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/chesstimer/sw.js');
    }
  </script>
</body>
</html>
