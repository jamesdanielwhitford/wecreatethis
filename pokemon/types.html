<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Type Matchup Reference</title>
<style>
  :root {
    --blue:#3b82f6; --bg:#0f1419; --panel:#1a2029; --panel2:#232b36;
    --text:#e5e9f0; --muted:#8b95a5;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.4; }
  header { padding:20px 24px 14px; border-bottom:1px solid #2a323d; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  h1 { margin:0; font-size:21px; }
  .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .back { color:var(--muted); text-decoration:none; font-size:13px; font-weight:600; white-space:nowrap; }
  .back:hover { color:var(--text); }
  .wrap { max-width:1000px; margin:0 auto; padding:22px 24px 60px; }

  /* Selection bar */
  .selbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:var(--panel); border-radius:12px; padding:14px 16px; }
  .selbar .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:700; }
  #selected { display:flex; gap:8px; flex-wrap:wrap; }
  .clearsel { background:var(--panel2); color:var(--muted); border:none; border-radius:8px; padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer; margin-left:auto; }
  .clearsel:hover { color:#ef4444; }
  .hint { color:var(--muted); font-size:13px; margin:14px 2px 8px; }

  /* Type pills */
  .chooser { display:flex; flex-wrap:wrap; gap:8px; }
  .tpill {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 13px; border-radius:22px; font-size:12px; font-weight:700; text-transform:uppercase;
    letter-spacing:.03em; cursor:pointer; border:2px solid transparent; background:var(--panel2);
    color:var(--muted); opacity:.7;
  }
  .tpill img { width:16px; height:16px; image-rendering:auto; flex-shrink:0; }
  .tpill:hover { opacity:1; }
  .tpill.on { background:var(--tc); color:#fff; border-color:rgba(255,255,255,.35); opacity:1; }
  .tpill.big { font-size:14px; padding:8px 16px; }
  .tpill.sm { cursor:default; opacity:1; background:var(--tc); color:#fff; }
  .tpill.sm b { background:rgba(0,0,0,.28); padding:1px 7px; border-radius:5px; font-variant-numeric:tabular-nums; }
  .muted { color:var(--muted); font-size:14px; }

  /* Offense / Defense columns */
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
  .colh { font-size:14px; margin:4px 0 12px; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .colh small { font-weight:500; color:var(--muted); font-size:12px; }
  @media (max-width:720px){ .cols { grid-template-columns:1fr; } }

  /* Detail */
  #detail { margin-top:22px; }
  .combo { font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .dsec { background:var(--panel); border-radius:12px; padding:14px 16px; margin-bottom:12px; border-left:5px solid; }
  .dsec.weak    { border-color:#ef4444; }
  .dsec.resist  { border-color:#22c55e; }
  .dsec.immune  { border-color:#14532d; }
  .dsec.neutral { border-color:#6b7280; }
  .dsec h3 { margin:0 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.04em; }
  .dsec.weak h3    { color:#fca5a5; }
  .dsec.resist h3  { color:#86efac; }
  .dsec.immune h3  { color:#9ae6b4; }
  .dsec.neutral h3 { color:#cbd5e1; }
  .drow { display:flex; flex-wrap:wrap; gap:8px; }
  .empty { color:var(--muted); padding:30px; text-align:center; }
  .note { color:var(--muted); font-size:12px; margin-top:18px; }
  @media (max-width:720px){
    header { padding:16px 14px 12px; flex-wrap:wrap; gap:8px; }
    h1 { font-size:18px; }
    .sub { font-size:12px; }
    .wrap { padding:16px 14px 50px; }
    .selbar { padding:12px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>📊 Type Matchup Reference</h1>
    <div class="sub">Pick one or two types to see both its offensive coverage and its defensive matchups at once.</div>
  </div>
  <div style="display:flex;gap:16px;align-items:center">
    <a class="back" href="/pokemon/dashboard">🔬 Type &amp; Team Lab</a>
    <a class="back" href="/pokemon/">← Back to calculator</a>
  </div>
</header>

<div class="wrap">
  <div class="selbar">
    <span class="lbl">Defending&nbsp;type(s)</span>
    <div id="selected"></div>
    <button class="clearsel" id="clearsel" style="display:none">Clear</button>
  </div>
  <div class="hint">Click a type below to add it (up to two, for a dual-type combo). Click a selected type to remove it.</div>
  <div class="chooser" id="chooser"></div>
  <div id="detail"></div>
</div>

<script src="logic.js"></script>
<script>
let selected = [];

/* Official round type-symbol icons (Gen IX / Scarlet-Violet); TYPE_ID lives in logic.js. */
function typeIcon(t){
  const id = TYPE_ID[t];
  if(!id) return "";
  const url = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/types/generation-ix/scarlet-violet/small/${id}.png`;
  return `<img src="${url}" alt="" onerror="this.remove()"/>`;
}

function buildChooser(){
  document.getElementById("chooser").innerHTML = TYPES.map(t =>
    `<button class="tpill" data-type="${t}" style="--tc:${TYPE_COLORS[t]}">${typeIcon(t)}${t}</button>`).join("");
}

function renderSelected(){
  const el = document.getElementById("selected");
  el.innerHTML = selected.length
    ? selected.map(t => `<button class="tpill big on" data-type="${t}" style="--tc:${TYPE_COLORS[t]}">${typeIcon(t)}${t} ✕</button>`).join("")
    : `<span class="muted">none yet — pick a type below</span>`;
  document.querySelectorAll("#chooser .tpill").forEach(b =>
    b.classList.toggle("on", selected.includes(b.dataset.type)));
  document.getElementById("clearsel").style.display = selected.length ? "" : "none";
}

function renderDetail(){
  const el = document.getElementById("detail");
  if(selected.length === 0){
    el.innerHTML = `<div class="empty">Select a type to see its offensive coverage and defensive matchups.</div>`;
    return;
  }

  // Build sections for a given per-type multiplier function and label config.
  const pill = (t, mult) => `<span class="tpill sm" style="--tc:${TYPE_COLORS[t]}">${typeIcon(t)}${t} <b>${fmtMult(mult)}</b></span>`;
  const build = (multFn, cfg) => {
    const groups = {};
    for(const t of TYPES){ const m = multFn(t); (groups[m] = groups[m] || []).push(t); }
    return cfg.map(({ title, cls, mults }) => {
      const types = mults.flatMap(m => groups[m] || []);
      if(types.length === 0) return "";
      return `<div class="dsec ${cls}"><h3>${title}</h3><div class="drow">${types.map(t => pill(t, multFn(t))).join("")}</div></div>`;
    }).join("");
  };

  // Offense: best same-type (STAB) hit of the selected type(s) against each defending type.
  const offense = build(t => bestStabMult(selected, [t]), [
    { title: "🟢 Super effective against", cls: "resist",  mults: [4, 2] },
    { title: "🔴 Not very effective against", cls: "weak", mults: [0.5, 0.25] },
    { title: "⚪ No effect against", cls: "immune", mults: [0] },
    { title: "➖ Neutral damage to", cls: "neutral", mults: [1] }
  ]);

  // Defense: damage the selected type(s) take from each attacking type.
  const defense = build(t => typeMult(t, selected), [
    { title: "🔴 Weak to — takes extra damage", cls: "weak", mults: [4, 2] },
    { title: "🟢 Resists — takes less damage", cls: "resist", mults: [0.25, 0.5] },
    { title: "⚪ Immune — takes no damage", cls: "immune", mults: [0] },
    { title: "➖ Neutral", cls: "neutral", mults: [1] }
  ]);

  el.innerHTML = `
    <div class="combo">Selected
      ${selected.map(t => `<span class="tpill sm" style="--tc:${TYPE_COLORS[t]}">${typeIcon(t)}${t}</span>`).join("")}</div>
    <div class="cols">
      <div><h2 class="colh">⚔️ Offense <small>your best same-type move vs each type</small></h2>${offense}</div>
      <div><h2 class="colh">🛡️ Defense <small>damage taken from each attacking type</small></h2>${defense}</div>
    </div>
    <div class="note">Offense uses the best of your selected type(s) attacking each defender; defense multiplies your
      type(s) together (a ½× and 2× cancel to neutral; 2× and 2× stack to 4×; any 0× immunity wins).</div>`;
}

function toggleType(t){
  if(selected.includes(t)) selected = selected.filter(x => x !== t);
  else { selected.push(t); if(selected.length > 2) selected.shift(); }
  renderAll();
}
function renderAll(){ renderSelected(); renderDetail(); }

document.getElementById("chooser").addEventListener("click", e => {
  const b = e.target.closest(".tpill"); if(b) toggleType(b.dataset.type);
});
document.getElementById("selected").addEventListener("click", e => {
  const b = e.target.closest(".tpill"); if(b){ selected = selected.filter(t => t !== b.dataset.type); renderAll(); }
});
document.getElementById("clearsel").addEventListener("click", () => { selected = []; renderAll(); });

buildChooser();
renderAll();
</script>
</body>
</html>
