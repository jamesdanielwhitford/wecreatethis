<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Blog</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fff;
      color: #111;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    nav {
      margin-bottom: 48px;
      font-size: 0.85rem;
      color: #888;
    }

    nav a {
      color: #111;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .post-meta {
      margin-bottom: 32px;
    }

    .post-meta h1 {
      font-size: 1.6rem;
      font-weight: normal;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .post-meta .meta-line {
      font-size: 0.85rem;
      color: #888;
    }

    .post-content {
      line-height: 1.8;
      font-size: 1rem;
    }

    .post-content h2 {
      font-size: 1.15rem;
      font-weight: normal;
      margin: 36px 0 12px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 6px;
    }

    .post-content p {
      margin-bottom: 16px;
    }

    .post-content a {
      color: #111;
    }

    .post-content pre {
      background: #f5f5f5;
      border-left: 3px solid #ccc;
      padding: 16px;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-content code {
      font-family: 'Courier New', monospace;
    }

    .post-content hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 32px 0;
    }

    .post-content strong {
      font-weight: bold;
    }

    .post-content em {
      font-style: italic;
    }

    .post-content ul, .post-content ol {
      margin-left: 24px;
      margin-bottom: 16px;
    }

    .post-content li {
      margin-bottom: 4px;
    }

    .post-content img {
      max-width: 100%;
      height: auto;
      margin: 16px 0;
    }

    #loading {
      color: #888;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/blog/">blog</a> /
    <span id="post-title-nav">...</span>
  </nav>

  <div id="loading">Loading...</div>
  <article id="post-container" style="display:none">
    <div class="post-meta">
      <h1 id="post-title"></h1>
      <div class="meta-line">
        <span id="post-date"></span> by <span id="post-author"></span>
      </div>
    </div>
    <div class="post-content" id="post-body"></div>
  </article>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/blog/sw.js', { scope: '/blog/' });
    }
  </script>
</body>
</html>
