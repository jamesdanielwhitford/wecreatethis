<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Blog</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fff;
      color: #111;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    nav {
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #888;
    }

    nav a {
      color: #111;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 40px;
    }

    .post-list {
      list-style: none;
    }

    .post-item {
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid #e0e0e0;
    }

    .post-item:last-child {
      border-bottom: none;
    }

    .post-date {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 6px;
    }

    .post-title a {
      font-size: 1.2rem;
      color: #111;
      text-decoration: none;
    }

    .post-title a:hover {
      text-decoration: underline;
    }

    .post-description {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #444;
      line-height: 1.5;
    }

    .post-author {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #888;
    }

    #loading {
      color: #888;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/blog/">blog</a>
  </nav>

  <header>
    <h1 id="section-title">...</h1>
  </header>

  <ul class="post-list" id="post-list">
    <li id="loading">Loading posts...</li>
  </ul>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/blog/sw.js', { scope: '/blog/' });
    }
  </script>
</body>
</html>
