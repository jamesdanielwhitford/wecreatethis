<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Blog</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fff;
      color: #111;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    nav {
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #888;
    }

    nav a {
      color: #111;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 40px;
    }

    #loading {
      color: #888;
      font-size: 0.95rem;
    }

    .post-entry {
      margin-bottom: 64px;
      padding-bottom: 64px;
      border-bottom: 1px solid #e0e0e0;
      scroll-margin-top: 24px;
    }

    .post-entry:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .post-meta {
      margin-bottom: 32px;
    }

    .post-meta h2 {
      font-size: 1.6rem;
      font-weight: normal;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .post-meta .meta-line {
      font-size: 0.85rem;
      color: #888;
    }

    .post-content {
      line-height: 1.8;
      font-size: 1rem;
    }

    .post-content.post-placeholder {
      color: #888;
    }

    .post-content h1 {
      font-size: 1.3rem;
      font-weight: normal;
      margin: 0 0 16px;
    }

    .post-content h2 {
      font-size: 1.15rem;
      font-weight: normal;
      margin: 36px 0 12px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 6px;
    }

    .post-content h3 {
      font-size: 1rem;
      font-weight: bold;
      margin: 24px 0 8px;
    }

    .post-content p {
      margin-bottom: 16px;
    }

    .post-content a {
      color: #111;
    }

    .post-content strong {
      font-weight: bold;
    }

    .post-content em {
      font-style: italic;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/blog/">blog</a> /
    <span id="section-nav">...</span>
  </nav>

  <header>
    <h1 id="section-title">...</h1>
  </header>

  <div id="loading">Loading...</div>
  <div id="post-stack" style="display:none"></div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/blog/sw.js', { scope: '/blog/' });
    }
  </script>
</body>
</html>
