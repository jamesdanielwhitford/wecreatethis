  <script>(function(){var b=localStorage.getItem('lf-brand'),k=localStorage.getItem('lf-ink'),r=document.documentElement.style;if(b)r.setProperty('--brand',b);if(k)r.setProperty('--ink',k);var raw=localStorage.getItem('lf-icon');if(raw){try{var g=JSON.parse(raw),rects='';for(var row=0;row<6;row++){for(var col=0;col<5;col++){if(g[row*5+col]){rects+='<rect fill="white" x="'+col+'" y="'+row+'" width="1" height="1"/>';}}}window._lfIconSvg=rects;}catch(e){}}})();</script>
  <style>

    .hnname { margin-left: 1px; margin-right: 5px; }
    #hnmain { min-width: 796px; }
    .title a { word-break: break-word; }
    .pagetop a:link, .pagetop a:visited { color: var(--ink); }
    .subtext a:link, .subtext a:visited { color: #828282; }
    .subtext a:hover { text-decoration: underline; }
    .comhead a:link, .comhead a:visited { color: #828282; }
    .comhead a:hover { text-decoration: underline; }
    .hnmore a:link, .hnmore a:visited { color: #828282; text-decoration: none; }


    @media only screen and (max-width: 750px) {
      #hnmain { width: 100%; min-width: 0; }
      body { padding: 0; margin: 0; width: 100%; }
      td { height: inherit !important; }
      .title { font-size: inherit; }
      span.pagetop { display: block; margin: 3px 5px; font-size: 12px; line-height: normal; }
      span.pagetop b { display: block; font-size: 15px; }
      .title { font-size: 11pt; line-height: 14pt; }
      .subtext { font-size: 9pt; }
      .votelinks { min-width: 18px; }
      input[type="text"] { font-size: 16px; width: 90%; }
    }

<body>

                  <rect fill="white" x="0" y="3" width="1" height="1"/>
                  <rect fill="white" x="4" y="3" width="1" height="1"/>
                  <rect fill="white" x="0" y="4" width="1" height="1"/>
                  <rect fill="white" x="4" y="4" width="1" height="1"/>

              <b class="hnname"><a href="/longform/" style="color:var(--ink);font-weight:700;" id="site-name">Long Form</a></b>
              <span style="color:var(--ink)">| hidden</span>
            </span>

  <!-- Spacer -->

  <!-- Footer -->

  <tr>
    <td>
      <table width="100%" cellspacing="0" cellpadding="1">
        <tbody>
        <tr>
          <td style="border-top:1px solid var(--brand);"></td>
        </tr>
        <tr>
          <td class="yclinks" style="text-align:center;padding:5px 0 8px;">
            <a href="/longform/customise">Customise</a> |
            <a href="/longform/example" id="example-footer-link" style="display:none;">Example</a><span id="example-footer-after" style="display:none;"> | </span><a href="/longform/view?id=0" target="_blank" rel="noopener">About</a> |
            <a href="/longform/view?id=-1" target="_blank" rel="noopener">Contact</a>
          </td>
        </tr>
        </tbody>
      </table>

  </tr>

  </tbody>

<script>

// --- Hidden posts ---

function loadHidden() {
  try { return new Set(JSON.parse(localStorage.getItem('lf-hidden') || '[]')); } catch(e) { return new Set(); }
}

function saveHidden(set) {
  localStorage.setItem('lf-hidden', JSON.stringify([...set]));
}

function unhidePost(postId) {
  const h = loadHidden();
  h.delete(postId);
  saveHidden(h);
}

function deletePost(postId) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('posts', 'readwrite');
    const req = tx.objectStore('posts').delete(postId);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function getPostsByTopicId(topicId) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').getAll();
    req.onsuccess = () => resolve(req.result.filter(p => p.topicId === topicId));
    req.onerror = () => reject(req.error);
  });
}

function getPostsBySubtopicId(subtopicId) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').getAll();
    req.onsuccess = () => resolve(req.result.filter(p => p.subtopicId === subtopicId));
    req.onerror = () => reject(req.error);
  });
}

function deleteSubtopicsByTopicId(topicId) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('subtopics', 'readwrite');
    const index = tx.objectStore('subtopics').index('topicId');
    const req = index.getAll(topicId);
    req.onsuccess = () => {
      const subs = req.result;
      let remaining = subs.length;
      if (remaining === 0) { resolve(); return; }
      subs.forEach(s => {
        const del = tx.objectStore('subtopics').delete(s.id);
        del.onsuccess = () => { if (--remaining === 0) resolve(); };
        del.onerror = () => reject(del.error);
      });
    };
    req.onerror = () => reject(req.error);
  });
}

function deleteSubtopic(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('subtopics', 'readwrite');
    const req = tx.objectStore('subtopics').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function deleteTopic(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('topics', 'readwrite');
    const req = tx.objectStore('topics').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function cleanupOrphanedTopics(post) {
  if (!post.topicId) return;
  if (post.subtopicId) {
    const subsWithPosts = await getPostsBySubtopicId(post.subtopicId);
    // subsWithPosts includes the post being deleted, so <= 1 means orphaned
    if (subsWithPosts.length <= 1) await deleteSubtopic(post.subtopicId);
  }
  const topicPosts = await getPostsByTopicId(post.topicId);
  if (topicPosts.length <= 1) {
    await deleteSubtopicsByTopicId(post.topicId);
    await deleteTopic(post.topicId);
  }
}

function deleteCommentsByPostId(pid) {
  return new Promise((resolve, reject) => {
    const tx = commentsDb.transaction('comments', 'readwrite');
    const index = tx.objectStore('comments').index('postId');
    const req = index.getAll(pid);
    req.onsuccess = () => {
      const comments = req.result;
      let remaining = comments.length;
      if (remaining === 0) { resolve(); return; }
      comments.forEach(c => {
        const del = tx.objectStore('comments').delete(c.id);
        del.onsuccess = () => { if (--remaining === 0) resolve(); };
        del.onerror = () => reject(del.error);
      });
    };
    req.onerror = () => reject(req.error);
  });
}

// --- IndexedDB ---

let db;
let commentsDb;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-posts', 2);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        const store = d.createObjectStore('posts', { keyPath: 'id', autoIncrement: true });
        store.createIndex('createdAt', 'createdAt', { unique: false });
      }
      if (oldVersion < 2) {
        const topicStore = d.createObjectStore('topics', { keyPath: 'id', autoIncrement: true });
        topicStore.createIndex('name', 'name', { unique: true });
        const subtopicStore = d.createObjectStore('subtopics', { keyPath: 'id', autoIncrement: true });
        subtopicStore.createIndex('name', 'name', { unique: false });
        subtopicStore.createIndex('topicId', 'topicId', { unique: false });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function openCommentsDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-comments', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('comments')) {
        const store = d.createObjectStore('comments', { keyPath: 'id', autoIncrement: true });
        store.createIndex('postId', 'postId', { unique: false });
        store.createIndex('parentId', 'parentId', { unique: false });
      }
    };
    req.onsuccess = (e) => { commentsDb = e.target.result; resolve(commentsDb); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function getCommentCountsForPosts(postIds) {
  return new Promise((resolve, reject) => {
    const counts = {};
    postIds.forEach(id => { counts[id] = 0; });
    const tx = commentsDb.transaction('comments', 'readonly');
    const store = tx.objectStore('comments').index('postId');
    let pending = postIds.length;
    if (pending === 0) { resolve(counts); return; }
    postIds.forEach(id => {
      const req = store.count(id);
      req.onsuccess = () => {
        counts[id] = req.result;
        if (--pending === 0) resolve(counts);
      };
      req.onerror = () => reject(req.error);
    });
  });
}

function getAllUserPosts() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// --- Helpers ---

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const s = Math.floor(diff / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d >= 365) { const y = Math.floor(d / 365); return y + ' year' + (y !== 1 ? 's' : '') + ' ago'; }
  if (d >= 30)  { const mo = Math.floor(d / 30);  return mo + ' month' + (mo !== 1 ? 's' : '') + ' ago'; }
  if (d >= 1)   return d + ' day' + (d !== 1 ? 's' : '') + ' ago';
  if (h >= 1)   return h + ' hour' + (h !== 1 ? 's' : '') + ' ago';
  if (m >= 1)   return m + ' minute' + (m !== 1 ? 's' : '') + ' ago';
  return 'just now';
}

function postTitleHref(post) {
  if (post.type === 'link') return post.url || '#';
  if (post.type === 'txt') return '/longform/view?id=' + post.id + '&src=user';
  if (post.type === 'file') return '/longform/view?id=' + post.id + '&src=user';
  return '/longform/post.html?id=' + post.id;
}

function postTitleTarget(post) {
  return (post.type === 'link' || post.type === 'txt' || post.type === 'file') ? ' target="_blank" rel="noopener"' : '';
}

function postDomain(post) {
  if (post.type === 'link' && post.url) {
    try { return new URL(post.url).hostname.replace(/^www\./, ''); } catch(e) {}
  }
  if (post.type === 'txt') return 'md';
  if (post.type === 'file') {
    if (post.fileName) {
      const ext = post.fileName.split('.').pop().toLowerCase();
      if (ext) return ext;
    }
    if (post.fileMime) return post.fileMime.split('/').pop().split('+')[0].toLowerCase();
  }
  return post.domain || 'longform';
}

let POSTS = [];
let currentPage = 1;
const PAGE_SIZE = 30;

function filteredPosts() {
  return POSTS;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderStories() {
  const tbody = document.getElementById('story-tbody');
  const allPosts = filteredPosts();
  const start = (currentPage - 1) * PAGE_SIZE;
  const pagePosts = allPosts.slice(start, start + PAGE_SIZE);
  const hasMore = allPosts.length > start + PAGE_SIZE;
  let html = '';

  pagePosts.forEach((post, i) => {
    const rank = start + i + 1;
    const href = escapeHtml(postTitleHref(post));
    const target = postTitleTarget(post);
    const domain = escapeHtml(postDomain(post));
    const isUserPost = !!post.createdAt;
    const agoText = isUserPost ? timeAgo(post.createdAt) : escapeHtml(post.ago || '');
    const commentCount = isUserPost ? (post._commentCount || 0) : (post.comments || 0);

    html += `
      <tr class="athing" id="post-${post.id}" data-post-id="${post.id}" style="height:19px;">
        <td class="title" style="width:22px;text-align:right;vertical-align:top;padding-right:3px;color:#828282;font-size:10pt;">
          ${rank}.
        </td>
        <td class="votelinks" style="width:14px;vertical-align:top;"></td>
        <td class="title" style="vertical-align:top;">
          <span class="titleline">
            <a href="${href}"${target}>${escapeHtml(post.title)}</a>
            <span class="sitebit comhead" style="font-size:8pt;color:#828282;"> (<span style="color:#828282;">${domain}</span>)</span>
          </span>
        </td>
      </tr>
      <tr data-post-id="${post.id}">
        <td colspan="2"></td>
        <td class="subtext" style="padding:0;">
          <a href="#">${agoText}</a>
          | <a href="#" class="unhide-link" data-post-id="${post.id}">unhide</a>
          ${post._isWelcome ? '' : `| <a href="#" class="delete-link" data-post-id="${post.id}">delete</a>`}
          | <a href="/longform/post.html?id=${post.id}${isUserPost ? '&src=user' : ''}">${commentCount} note${commentCount !== 1 ? 's' : ''}</a>
        </td>
      </tr>
      <tr class="spacer" data-post-id="${post.id}" style="height:5px;"><td></td></tr>`;
  });

  if (allPosts.length === 0) {
    html = `<tr><td colspan="3" style="padding:20px 8px;color:#828282;font-size:10pt;">No hidden posts.</td></tr>`;
  }

  if (hasMore) {
    html += `
      <tr class="morespace" style="height:10px;"><td></td></tr>
      <tr>
        <td colspan="3" class="title hnmore" style="padding:4px 0 8px 38px;">
          <a href="#" id="more-link">More</a>
        </td>
      </tr>`;
  }

  tbody.innerHTML = html;

  const moreLink = document.getElementById('more-link');
  if (moreLink) {
    moreLink.addEventListener('click', e => {
      e.preventDefault();
      currentPage++;
      renderStories();
      window.scrollTo(0, 0);
    });
  }

  // Wire up unhide links
  document.querySelectorAll('.unhide-link').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      unhidePost(Number(a.dataset.postId));
      POSTS = POSTS.filter(p => p.id !== Number(a.dataset.postId));
      renderStories();
    });
  });

  // Wire up delete links
  document.querySelectorAll('.delete-link').forEach(a => {
    a.addEventListener('click', async e => {
      e.preventDefault();
      const id = Number(a.dataset.postId);
      const post = POSTS.find(p => p.id === id);
      const title = post ? post.title : 'this post';
      if (!confirm('Delete "' + title + '"? This cannot be undone.')) return;
      if (post) await cleanupOrphanedTopics(post);
      await deletePost(id);
      await deleteCommentsByPostId(id);
      unhidePost(id);
      POSTS = POSTS.filter(p => p.id !== id);
      renderStories();
    });
  });
}

const WELCOME_POST = {
  id: 0,
  title: 'Welcome',
  type: 'txt',
  text: '',
  author: 'James Daniel Whitford',
  date: '2026-02',
  createdAt: 1740481200000,
  score: 0,
  comments: 0,
  _isWelcome: true
};

async function init() {
  await openDB();
  await openCommentsDB();
  const hidden = loadHidden();
  const userPosts = await getAllUserPosts();
  // Include welcome post if hidden
  if (hidden.has(0)) userPosts.push(WELCOME_POST);
  // Only show hidden posts
  const hiddenPosts = userPosts.filter(p => hidden.has(p.id));
  const counts = await getCommentCountsForPosts(hiddenPosts.filter(p => !p._isWelcome).map(p => p.id));
  hiddenPosts.forEach(p => { p._commentCount = p._isWelcome ? 0 : (counts[p.id] || 0); });
  hiddenPosts.sort((a, b) => b.createdAt - a.createdAt);
  POSTS = hiddenPosts;
  renderStories();
}

init();

(function(){
  const name = localStorage.getItem('lf-name');
  if (name) { const el = document.getElementById('site-name'); if (el) el.textContent = name; }
  const showEx = localStorage.getItem('lf-example') !== '0';
  const exLink = document.getElementById('example-footer-link');
  const exAfter = document.getElementById('example-footer-after');
  if (exLink) exLink.style.display = showEx ? '' : 'none';
  if (exAfter) exAfter.style.display = showEx ? '' : 'none';
})();

if (window._lfIconSvg !== undefined) {
  const navSvg = document.querySelector('td[style*="width:18px"] svg');
  if (navSvg) navSvg.innerHTML = window._lfIconSvg;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/longform/sw.js', { scope: '/longform/' });
}
</script>
