<script>
const S_GIF = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

// --- URL / post init ---

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const postIdRaw = getParam('id');
const postId = parseInt(postIdRaw, 10);
const postSrc = getParam('src'); // 'user' means load from IndexedDB

const WELCOME_POST = {
  id: 0,
  title: 'Welcome',
  type: 'txt',
  text: '',
  author: 'James Daniel Whitford',
  date: '2026-02',
  createdAt: 1740481200000,
  score: 0,
  comments: 0,
  _isWelcome: true
};

let post = null;

// --- Helpers ---

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const s = Math.floor(diff / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d >= 365) { const y = Math.floor(d / 365); return y + ' year' + (y !== 1 ? 's' : '') + ' ago'; }
  if (d >= 30)  { const mo = Math.floor(d / 30);  return mo + ' month' + (mo !== 1 ? 's' : '') + ' ago'; }
  if (d >= 1)   return d + ' day' + (d !== 1 ? 's' : '') + ' ago';
  if (h >= 1)   return h + ' hour' + (h !== 1 ? 's' : '') + ' ago';
  if (m >= 1)   return m + ' minute' + (m !== 1 ? 's' : '') + ' ago';
  return 'just now';
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// --- IndexedDB ---

let db;
let postsDb;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-comments', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('comments')) {
        const store = d.createObjectStore('comments', { keyPath: 'id', autoIncrement: true });
        store.createIndex('postId', 'postId', { unique: false });
        store.createIndex('parentId', 'parentId', { unique: false });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function openPostsDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-posts', 2);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        d.createObjectStore('posts', { keyPath: 'id', autoIncrement: true });
      }
      if (oldVersion < 2) {
        const topicStore = d.createObjectStore('topics', { keyPath: 'id', autoIncrement: true });
        topicStore.createIndex('name', 'name', { unique: true });
        const subtopicStore = d.createObjectStore('subtopics', { keyPath: 'id', autoIncrement: true });
        subtopicStore.createIndex('name', 'name', { unique: false });
        subtopicStore.createIndex('topicId', 'topicId', { unique: false });
      }
    };
    req.onsuccess = (e) => { postsDb = e.target.result; resolve(postsDb); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function getUserPost(id) {
  return new Promise((resolve, reject) => {
    const tx = postsDb.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function deletePostFromDB(id) {
  return new Promise((resolve, reject) => {
    const tx = postsDb.transaction('posts', 'readwrite');
    const req = tx.objectStore('posts').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function deleteCommentsByPostId(pid) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('comments', 'readwrite');
    const index = tx.objectStore('comments').index('postId');
    const req = index.getAll(pid);
    req.onsuccess = () => {
      const comments = req.result;
      let remaining = comments.length;
      if (remaining === 0) { resolve(); return; }
      comments.forEach(c => {
        const del = tx.objectStore('comments').delete(c.id);
        del.onsuccess = () => { if (--remaining === 0) resolve(); };
        del.onerror = () => reject(del.error);
      });
    };
    req.onerror = () => reject(req.error);
  });
}

function getPostsByTopicId(topicId) {
  return new Promise((resolve, reject) => {
    const tx = postsDb.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').getAll();
    req.onsuccess = () => resolve(req.result.filter(p => p.topicId === topicId));
    req.onerror = () => reject(req.error);
  });
}

function getPostsBySubtopicId(subtopicId) {
  return new Promise((resolve, reject) => {
    const tx = postsDb.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').getAll();
    req.onsuccess = () => resolve(req.result.filter(p => p.subtopicId === subtopicId));
    req.onerror = () => reject(req.error);
  });
}

function deleteSubtopicsByTopicId(topicId) {
  return new Promise((resolve, reject) => {
    const tx = postsDb.transaction('subtopics', 'readwrite');
    const index = tx.objectStore('subtopics').index('topicId');
    const req = index.getAll(topicId);
    req.onsuccess = () => {
      const subs = req.result;
      let remaining = subs.length;
      if (remaining === 0) { resolve(); return; }
      subs.forEach(s => {
        const del = tx.objectStore('subtopics').delete(s.id);
        del.onsuccess = () => { if (--remaining === 0) resolve(); };
        del.onerror = () => reject(del.error);
      });
    };
    req.onerror = () => reject(req.error);
  });
}

function deleteSubtopic(id) {
  return new Promise((resolve, reject) => {
    const tx = postsDb.transaction('subtopics', 'readwrite');
    const req = tx.objectStore('subtopics').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function deleteTopic(id) {
  return new Promise((resolve, reject) => {
    const tx = postsDb.transaction('topics', 'readwrite');
    const req = tx.objectStore('topics').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function cleanupOrphanedTopics(p) {
  if (!p.topicId) return;
  if (p.subtopicId) {
    const subsWithPosts = await getPostsBySubtopicId(p.subtopicId);
    // includes the post being deleted, so <= 1 means orphaned
    if (subsWithPosts.length <= 1) await deleteSubtopic(p.subtopicId);
  }
  const topicPosts = await getPostsByTopicId(p.topicId);
  if (topicPosts.length <= 1) {
    await deleteSubtopicsByTopicId(p.topicId);
    await deleteTopic(p.topicId);
  }
}

function getCommentsByPostId(pid) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('comments', 'readonly');
    const req = tx.objectStore('comments').index('postId').getAll(pid);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function addComment(comment) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('comments', 'readwrite');
    const req = tx.objectStore('comments').add(comment);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function updateComment(comment) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('comments', 'readwrite');
    const req = tx.objectStore('comments').put(comment);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function deleteComment(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('comments', 'readwrite');
    const req = tx.objectStore('comments').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// Collect all descendant IDs of a note (recursive, from flat list)
function getDescendantIds(id, allComments) {
  const ids = [];
  const children = allComments.filter(c => c.parentId === id);
  children.forEach(c => {
    ids.push(c.id);
    ids.push(...getDescendantIds(c.id, allComments));
  });
  return ids;
}

// --- Tree builder ---

function buildTree(comments) {
  const byId = {};
  const roots = [];
  comments.forEach(c => { byId[c.id] = { ...c, children: [] }; });
  comments.forEach(c => {
    if (c.parentId === null || c.parentId === undefined) {
      roots.push(byId[c.id]);
    } else if (byId[c.parentId]) {
      byId[c.parentId].children.push(byId[c.id]);
    }
  });

  function assignAndSort(siblings, newestFirst) {
    // Assign sortOrder to any sibling missing one
    const maxOrder = siblings.reduce((m, s) => Math.max(m, s.sortOrder ?? 0), 0);
    let next = maxOrder + 1;
    siblings.forEach(s => { if (s.sortOrder == null) { s.sortOrder = next++; } });
    siblings.sort((a, b) => newestFirst ? b.sortOrder - a.sortOrder : a.sortOrder - b.sortOrder);
    siblings.forEach(s => assignAndSort(s.children, false));
  }

  assignAndSort(roots, true);
  return roots;
}

// --- Render functions ---

function postTitleHref(p) {
  if (p.type === 'link') return p.url || '#';
  if (p.type === 'txt') return '/longform/view?id=' + p.id + '&src=user';
  if (p.type === 'file') return '/longform/view?id=' + p.id + '&src=user';
  return '#';
}

function postTitleTarget(p) {
  return (p.type === 'link' || p.type === 'txt' || p.type === 'file') ? ' target="_blank" rel="noopener"' : '';
}

function postDomain(p) {
  if (p.type === 'link' && p.url) {
    try { return new URL(p.url).hostname.replace(/^www\./, ''); } catch(e) {}
  }
  if (p.type === 'txt') return 'md';
  if (p.type === 'file') {
    if (p.fileName) {
      const ext = p.fileName.split('.').pop().toLowerCase();
      if (ext) return ext;
    }
    if (p.fileMime) return p.fileMime.split('/').pop().split('+')[0].toLowerCase();
  }
  return p.domain || 'longform';
}

function renderStoryHeader(commentCount) {
  const href = escapeHtml(postTitleHref(post));
  const target = postTitleTarget(post);
  const domain = escapeHtml(postDomain(post));
  const agoText = post.createdAt ? timeAgo(post.createdAt) : escapeHtml(post.ago || '');
  const mutableLinks = post._isWelcome
    ? ''
    : ` | <a href="#" id="delete-post-link">delete</a> | <a href="/longform/edit?id=${postId}&src=user">edit</a>`;
  return `
    <tr class="athing submission">
      <td align="right" valign="top" class="title"><span class="rank"></span></td>
      <td valign="top" class="votelinks">
        <center><div class="votearrow" title="upvote"></div></center>
      </td>
      <td class="title">
        <span class="titleline">
          <a href="${href}"${target}>${escapeHtml(post.title)}</a>
          <span class="sitebit comhead"> (<span style="color:#828282;">${domain}</span>)</span>
        </span>
      </td>
    </tr>
    <tr>
      <td colspan="2"></td>
      <td class="subtext">
        ${post.author ? `by ${escapeHtml(post.author)} | ` : ''}<span class="age"><a href="#">${agoText}</a></span>
        | <a href="#" id="hide-post-link">${loadHidden().has(postId) ? 'unhide' : 'hide'}</a>${mutableLinks}
        | <a href="#comments">${commentCount}&nbsp;note${commentCount !== 1 ? 's' : ''}</a>
      </td>
    </tr>
    <tr style="height:10px;"><td></td></tr>`;
}

function renderCommentForm() {
  return `
    <tr>
      <td colspan="2"></td>
      <td>
        <form id="comment-form">
          <textarea id="comment-text" name="text" rows="8" cols="80" wrap="virtual" style="vertical-align:bottom"></textarea>
          &nbsp;<font size="-2" color="#AFAFAF">help</font><br><br>
          <input type="submit" value="add note">
        </form>
      </td>
    </tr>
    <tr style="height:20px;"><td></td></tr>`;
}

function renderComment(node, depth, ancestors) {
  const indentPx = depth * 40;
  const ago = timeAgo(node.createdAt);
  const ancestorAttr = ancestors.length ? ` data-ancestors="${ancestors.join(',')}"` : '';
  const isRoot = depth === 0;
  const navs = isRoot
    ? ` <a class="togg" data-id="${node.id}" href="#">[&ndash;]</a>`
    : ` | <a href="#comment-${ancestors[0]}">root</a> | <a href="#comment-${ancestors[ancestors.length - 1]}">parent</a> <a class="togg" data-id="${node.id}" href="#">[&ndash;]</a>`;

  let rows = `
    <tr class="athing comtr" id="comment-${node.id}"${ancestorAttr}>
      <td>
        <table border="0">
          <tbody>
            <tr>
              <td class="ind"><img src="${S_GIF}" height="1" width="${indentPx}"></td>
              <td valign="top" class="votelinks">
                <center><div class="votearrow" title="upvote"></div></center>
              </td>
              <td class="default">
                <div style="margin-top:2px;margin-bottom:-10px;">
                  <span class="comhead">
                    <span class="age"><a href="#">${ago}</a></span><span class="navs">${navs}</span>
                  </span>
                </div>
                <br>
                <div class="comment" id="cbody-${node.id}">
                  <span class="commtext" id="commtext-${node.id}">${escapeHtml(node.text)}</span>
                  <div class="reply">
                    <a href="#" class="reply-link" data-id="${node.id}">reply</a>
                    | <a href="#" class="edit-link" data-id="${node.id}">edit</a>
                    | <a href="#" class="delete-link" data-id="${node.id}" data-has-children="${node.children.length > 0 ? '1' : '0'}">delete</a>
                  </div>
                  <div class="reply-form" id="reply-form-${node.id}">
                    <textarea rows="6" cols="60" id="reply-text-${node.id}"
                      style="border:1px solid rgb(118,118,118);font-family:monospace;font-size:10pt;display:block;"></textarea>
                    <br>
                    <input type="button" value="add note" class="reply-submit" data-parent="${node.id}">
                    &nbsp;<a href="#" class="reply-cancel" data-id="${node.id}">cancel</a>
                  </div>
                  <div class="edit-form" id="edit-form-${node.id}" style="display:none;margin-top:6px;">
                    <textarea rows="6" cols="60" id="edit-text-${node.id}"
                      style="border:1px solid rgb(118,118,118);font-family:monospace;font-size:10pt;display:block;">${escapeHtml(node.text)}</textarea>
                    <br>
                    <input type="button" value="save" class="edit-submit" data-id="${node.id}">
                    &nbsp;<a href="#" class="edit-cancel" data-id="${node.id}">cancel</a>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>`;

  const childAncestors = [...ancestors, node.id];
  node.children.forEach(child => {
    rows += renderComment(child, depth + 1, childAncestors);
  });

  return rows;
}

// --- Hidden posts ---

function loadHidden() {
  try { return new Set(JSON.parse(localStorage.getItem('lf-hidden') || '[]')); } catch(e) { return new Set(); }
}

function saveHidden(set) {
  localStorage.setItem('lf-hidden', JSON.stringify([...set]));
}

// --- Main render ---

async function renderPage() {
  await openDB();

  // Resolve post on first call only
  if (!post) {
    if (postId === 0) {
      post = WELCOME_POST;
    } else {
      await openPostsDB();
      post = await getUserPost(postId);
      if (!post) {
        document.getElementById('fatitem-tbody').innerHTML =
          '<tr><td style="padding:20px;color:#828282;font-size:10pt;">Post not found.</td></tr>';
        return;
      }
    }
    document.title = post.title + ' | Long Form';
  }

  const allComments = await getCommentsByPostId(postId);
  const tree = buildTree(allComments);

  document.getElementById('fatitem-tbody').innerHTML = renderStoryHeader(allComments.length) + renderCommentForm();

  let commentsHtml = '';
  if (tree.length === 0) {
    commentsHtml = `<tr><td style="padding:8px 0;color:#828282;font-size:10pt;">No notes yet.</td></tr>`;
  } else {
    tree.forEach(root => {
      commentsHtml += renderComment(root, 0, []);
    });
  }

  document.getElementById('comment-tbody').innerHTML = commentsHtml;
  bindEvents();
}

// --- Event binding ---

function bindEvents() {
  // Root comment submit
  document.getElementById('comment-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = document.getElementById('comment-text').value.trim();
    if (!text) return;
    const allComments = await getCommentsByPostId(postId);
    const roots = allComments.filter(c => c.parentId == null);
    const maxOrder = roots.reduce((m, c) => Math.max(m, c.sortOrder ?? 0), 0);
    await addComment({ postId, parentId: null, author: 'james', text, createdAt: Date.now(), sortOrder: maxOrder + 1 });
    document.getElementById('comment-text').value = '';
    await renderPage();
  });

  // Hide / unhide post
  const hideLink = document.getElementById('hide-post-link');
  if (hideLink) {
    hideLink.addEventListener('click', (e) => {
      e.preventDefault();
      const h = loadHidden();
      if (h.has(postId)) {
        h.delete(postId);
        saveHidden(h);
        hideLink.textContent = 'hide';
      } else {
        h.add(postId);
        saveHidden(h);
        window.location.href = '/longform/';
      }
    });
  }

  // Delete post
  const deleteLink = document.getElementById('delete-post-link');
  if (deleteLink) {
    deleteLink.addEventListener('click', async (e) => {
      e.preventDefault();
      if (!confirm('Delete "' + (post ? post.title : 'this post') + '"? This cannot be undone.')) return;
      if (post) await cleanupOrphanedTopics(post);
      await deletePostFromDB(postId);
      await deleteCommentsByPostId(postId);
      const h = loadHidden();
      h.delete(postId);
      saveHidden(h);
      localStorage.removeItem('lf-filters');
      window.location.href = '/longform/';
    });
  }

  // Collapse toggles
  document.querySelectorAll('.togg').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const id = String(link.dataset.id);
      const body = document.getElementById('cbody-' + id);
      const collapsed = body.classList.toggle('coll');
      link.textContent = collapsed ? '[+]' : '[\u2013]';
      // Hide/show all descendant rows
      document.querySelectorAll('[data-ancestors]').forEach(row => {
        if (row.dataset.ancestors.split(',').includes(id)) {
          row.style.display = collapsed ? 'none' : '';
        }
      });
    });
  });

  // Reply link — show inline form
  document.querySelectorAll('.reply-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const form = document.getElementById('reply-form-' + link.dataset.id);
      form.style.display = form.style.display === 'block' ? 'none' : 'block';
    });
  });

  // Reply cancel
  document.querySelectorAll('.reply-cancel').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const id = link.dataset.id;
      document.getElementById('reply-form-' + id).style.display = 'none';
      document.getElementById('reply-text-' + id).value = '';
    });
  });

  // Reply submit
  document.querySelectorAll('.reply-submit').forEach(btn => {
    btn.addEventListener('click', async () => {
      const parentId = parseInt(btn.dataset.parent, 10);
      const text = document.getElementById('reply-text-' + parentId).value.trim();
      if (!text) return;
      const allComments = await getCommentsByPostId(postId);
      const siblings = allComments.filter(c => c.parentId === parentId);
      const maxOrder = siblings.reduce((m, c) => Math.max(m, c.sortOrder ?? 0), 0);
      await addComment({ postId, parentId, author: 'james', text, createdAt: Date.now(), sortOrder: maxOrder + 1 });
      await renderPage();
    });
  });

  // Edit link — show inline edit form
  document.querySelectorAll('.edit-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const id = link.dataset.id;
      const form = document.getElementById('edit-form-' + id);
      form.style.display = form.style.display === 'block' ? 'none' : 'block';
      if (form.style.display === 'block') document.getElementById('edit-text-' + id).focus();
    });
  });

  // Edit cancel
  document.querySelectorAll('.edit-cancel').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('edit-form-' + link.dataset.id).style.display = 'none';
    });
  });

  // Edit save
  document.querySelectorAll('.edit-submit').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = parseInt(btn.dataset.id, 10);
      const text = document.getElementById('edit-text-' + id).value.trim();
      if (!text) return;
      const allComments = await getCommentsByPostId(postId);
      const note = allComments.find(c => c.id === id);
      if (!note) return;
      note.text = text;
      await updateComment(note);
      await renderPage();
    });
  });

  // Delete link
  const overlay = document.getElementById('delete-modal-overlay');
  function closeModal() { overlay.classList.remove('open'); }

  document.querySelectorAll('.delete-link').forEach(link => {
    link.addEventListener('click', async (e) => {
      e.preventDefault();
      const id = parseInt(link.dataset.id, 10);
      const hasChildren = link.dataset.hasChildren === '1';

      if (hasChildren) {
        overlay.classList.add('open');

        // Clone buttons to clear old listeners
        ['modal-delete-all', 'modal-delete-only', 'modal-cancel'].forEach(btnId => {
          const old = document.getElementById(btnId);
          const fresh = old.cloneNode(true);
          old.parentNode.replaceChild(fresh, old);
        });

        document.getElementById('modal-cancel').addEventListener('click', closeModal);

        document.getElementById('modal-delete-all').addEventListener('click', async () => {
          closeModal();
          const allComments = await getCommentsByPostId(postId);
          const descIds = getDescendantIds(id, allComments);
          await Promise.all([deleteComment(id), ...descIds.map(deleteComment)]);
          await renderPage();
        });

        document.getElementById('modal-delete-only').addEventListener('click', async () => {
          closeModal();
          const allComments = await getCommentsByPostId(postId);
          const note = allComments.find(c => c.id === id);
          const children = allComments.filter(c => c.parentId === id);
          await Promise.all(children.map(c => {
            c.parentId = note.parentId ?? null;
            return updateComment(c);
          }));
          await deleteComment(id);
          await renderPage();
        });

      } else {
        if (!confirm('Delete this note?')) return;
        await deleteComment(id);
        await renderPage();
      }
    });
  });

  // Upvote arrows — move note up one position among siblings
  document.querySelectorAll('.votearrow').forEach(arrow => {
    arrow.addEventListener('click', async (e) => {
      e.preventDefault();
      const tr = arrow.closest('tr.athing.comtr');
      if (!tr) return;
      const id = parseInt(tr.id.replace('comment-', ''), 10);
      const allComments = await getCommentsByPostId(postId);
      const note = allComments.find(c => c.id === id);
      if (!note) return;
      const siblings = allComments.filter(c =>
        (c.parentId ?? null) === (note.parentId ?? null)
      );
      // Assign sortOrder to any missing, same logic as buildTree
      const isRoot = note.parentId == null;
      const maxOrder = siblings.reduce((m, c) => Math.max(m, c.sortOrder ?? 0), 0);
      let next = maxOrder + 1;
      siblings.forEach(s => { if (s.sortOrder == null) s.sortOrder = next++; });
      // Sort same direction as buildTree (roots: desc, children: asc)
      siblings.sort((a, b) => isRoot ? b.sortOrder - a.sortOrder : a.sortOrder - b.sortOrder);
      const idx = siblings.findIndex(s => s.id === id);
      if (idx <= 0) return; // already first
      const above = siblings[idx - 1];
      // Swap sortOrders
      const tmp = above.sortOrder;
      above.sortOrder = note.sortOrder;
      note.sortOrder = tmp;
      await Promise.all([updateComment(note), updateComment(above)]);
      await renderPage();
    });
  });
}

// --- Boot ---

(function(){
  const name = localStorage.getItem('lf-name');
  if (name) { const el = document.getElementById('site-name'); if (el) el.textContent = name; }
})();

renderPage();

if (window._lfIconSvg !== undefined) {
  const navSvg = document.querySelector('td[style*="width:18px"] svg');
  if (navSvg) navSvg.innerHTML = window._lfIconSvg;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/longform/sw.js', { scope: '/longform/' });
}
</script>
