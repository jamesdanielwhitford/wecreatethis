// --- URL / post init ---

function getPostId() {
  return parseInt(new URLSearchParams(window.location.search).get('id'), 10);
}

const postId = getPostId();
const post = POSTS.find(p => p.id === postId);

if (!post) {
  document.getElementById('item-tbody').innerHTML =
    '<tr><td style="padding:20px;color:#828282;font-size:10pt;">Post not found.</td></tr>';
  throw new Error('Post not found: ' + postId);
}

document.title = post.title + ' | Long Form';

// --- Helpers ---

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const s = Math.floor(diff / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d >= 365) { const y = Math.floor(d / 365); return y + ' year' + (y !== 1 ? 's' : '') + ' ago'; }
  if (d >= 30)  { const mo = Math.floor(d / 30);  return mo + ' month' + (mo !== 1 ? 's' : '') + ' ago'; }
  if (d >= 1)   return d + ' day' + (d !== 1 ? 's' : '') + ' ago';
  if (h >= 1)   return h + ' hour' + (h !== 1 ? 's' : '') + ' ago';
  if (m >= 1)   return m + ' minute' + (m !== 1 ? 's' : '') + ' ago';
  return 'just now';
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// --- IndexedDB ---

let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-comments', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('comments')) {
        const store = d.createObjectStore('comments', { keyPath: 'id', autoIncrement: true });
        store.createIndex('postId', 'postId', { unique: false });
        store.createIndex('parentId', 'parentId', { unique: false });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function getCommentsByPostId(pid) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('comments', 'readonly');
    const req = tx.objectStore('comments').index('postId').getAll(pid);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function addComment(comment) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('comments', 'readwrite');
    const req = tx.objectStore('comments').add(comment);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// --- Tree builder ---

function buildTree(comments) {
  const byId = {};
  const roots = [];
  comments.forEach(c => { byId[c.id] = { ...c, children: [] }; });
  comments.forEach(c => {
    if (c.parentId === null || c.parentId === undefined) {
      roots.push(byId[c.id]);
    } else if (byId[c.parentId]) {
      byId[c.parentId].children.push(byId[c.id]);
    }
  });
  roots.sort((a, b) => b.createdAt - a.createdAt);
  function sortChildren(node) {
    node.children.sort((a, b) => a.createdAt - b.createdAt);
    node.children.forEach(sortChildren);
  }
  roots.forEach(sortChildren);
  return roots;
}

function renderCommentForm() {

function renderComment(node, depth, ancestors) {
  const indentPx = depth * 40;
  const ago = timeAgo(node.createdAt);
  const ancestorAttr = ancestors.length ? ` data-ancestors="${ancestors.join(',')}"` : '';
  const isRoot = depth === 0;
  const navs = isRoot
    ? ` | <a href="#">next</a> <a class="togg" data-id="${node.id}" href="#">[&ndash;]</a>`
    : ` | <a href="#comment-${ancestors[0]}">root</a> | <a href="#comment-${ancestors[ancestors.length - 1]}">parent</a> | <a href="#">next</a> <a class="togg" data-id="${node.id}" href="#">[&ndash;]</a>`;

  let rows = `
    <tr class="athing comtr" id="comment-${node.id}"${ancestorAttr}>
      <td>
        <table border="0">
          <tbody>
            <tr>
              <td class="ind"><img src="${S_GIF}" height="1" width="${indentPx}"></td>
              <td valign="top" class="votelinks">
                <center><div class="votearrow" title="upvote"></div></center>
              </td>
              <td class="default">
                <div style="margin-top:2px;margin-bottom:-10px;">
                  <span class="comhead">
                    <a class="hnuser" href="#">james</a>&nbsp;<span class="age"><a href="#">${ago}</a></span><span class="navs">${navs}</span>
                  </span>
                </div>
                <br>
                <div class="comment" id="cbody-${node.id}">
                  <span class="commtext">${escapeHtml(node.text)}</span>
                  <div class="reply"><a href="#" class="reply-link" data-id="${node.id}">reply</a></div>
                  <div class="reply-form" id="reply-form-${node.id}">
                    <textarea rows="6" cols="60" id="reply-text-${node.id}"
                      style="border:1px solid rgb(118,118,118);font-family:monospace;font-size:10pt;display:block;"></textarea>
                    <br>
                    <input type="button" value="add comment" class="reply-submit" data-parent="${node.id}">
                    &nbsp;<a href="#" class="reply-cancel" data-id="${node.id}">cancel</a>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>`;

  const childAncestors = [...ancestors, node.id];
  node.children.forEach(child => {
    rows += renderComment(child, depth + 1, childAncestors);
  });

  return rows;
}

// --- Main render ---

async function renderPage() {
  await openDB();

  document.getElementById('fatitem-tbody').innerHTML = renderStoryHeader() + renderCommentForm();

  const allComments = await getCommentsByPostId(postId);
  const tree = buildTree(allComments);

  let commentsHtml = '';
  if (tree.length === 0) {
    commentsHtml = `<tr><td style="padding:8px 0;color:#828282;font-size:10pt;">No comments yet.</td></tr>`;
  } else {
    tree.forEach(root => {
      commentsHtml += renderComment(root, 0, []);
    });
  }

  document.getElementById('comment-tbody').innerHTML = commentsHtml;
  bindEvents();
}

// --- Event binding ---

function bindEvents() {
  // Root comment submit
  document.getElementById('comment-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = document.getElementById('comment-text').value.trim();
    if (!text) return;
    await addComment({ postId, parentId: null, author: 'james', text, createdAt: Date.now() });
    document.getElementById('comment-text').value = '';
    await renderPage();
  });

  // Collapse toggles
  document.querySelectorAll('.togg').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const id = String(link.dataset.id);
      const body = document.getElementById('cbody-' + id);
      const collapsed = body.classList.toggle('coll');
      link.textContent = collapsed ? '[+]' : '[\u2013]';
      // Hide/show all descendant rows
      document.querySelectorAll('[data-ancestors]').forEach(row => {
        if (row.dataset.ancestors.split(',').includes(id)) {
          row.style.display = collapsed ? 'none' : '';
        }
      });
    });
  });

  // Reply link — show inline form
  document.querySelectorAll('.reply-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const form = document.getElementById('reply-form-' + link.dataset.id);
      form.style.display = form.style.display === 'block' ? 'none' : 'block';
    });
  });

  // Reply cancel
  document.querySelectorAll('.reply-cancel').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const id = link.dataset.id;
      document.getElementById('reply-form-' + id).style.display = 'none';
      document.getElementById('reply-text-' + id).value = '';
    });
  });

  // Reply submit
  document.querySelectorAll('.reply-submit').forEach(btn => {
    btn.addEventListener('click', async () => {
      const parentId = parseInt(btn.dataset.parent, 10);
      const text = document.getElementById('reply-text-' + parentId).value.trim();
      if (!text) return;
      await addComment({ postId, parentId, author: 'james', text, createdAt: Date.now() });
      await renderPage();
    });
  });
}

// --- Boot ---

renderPage();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/longform/sw.js', { scope: '/longform/' });
}
</script>

</body>
</html>
