<script>

// --- Hidden posts (stored in localStorage as JSON array of post IDs) ---

function loadHidden() {
  try { return new Set(JSON.parse(localStorage.getItem('lf-hidden') || '[]')); } catch(e) { return new Set(); }
}

function saveHidden(set) {
  localStorage.setItem('lf-hidden', JSON.stringify([...set]));
}

function hidePost(postId) {
  const h = loadHidden();
  h.add(postId);
  saveHidden(h);
  updateHiddenFooter();
}

function updateHiddenFooter() {
  const h = loadHidden();
  const sep = document.getElementById('hidden-footer-sep');
  const link = document.getElementById('hidden-footer-link');
  if (!sep || !link) return;
  const show = h.size > 0;
  sep.style.display = show ? '' : 'none';
  link.style.display = show ? '' : 'none';
}

// --- Sort order (stored in localStorage as JSON map: postId -> order) ---

function loadSortOrders() {
  try { return JSON.parse(localStorage.getItem('lf-sort') || '{}'); } catch(e) { return {}; }
}

function saveSortOrders(map) {
  localStorage.setItem('lf-sort', JSON.stringify(map));
}

function applySortOrders(posts) {
  const map = loadSortOrders();
  // assign a stable default order to any post not yet in the map
  // use max existing rank + 1 to avoid collisions with already-ranked posts
  let changed = false;
  posts.forEach((p) => {
    if (map[p.id] === undefined) {
      const maxRank = Object.keys(map).length > 0 ? Math.max(...Object.values(map)) : 0;
      map[p.id] = maxRank + 1;
      changed = true;
    }
  });
  if (changed) saveSortOrders(map);
  // sort by stored order
  posts.sort((a, b) => map[a.id] - map[b.id]);
  // normalize: reassign sequential ranks 1..N to eliminate any duplicates
  posts.forEach((p, i) => { map[p.id] = i + 1; });
  saveSortOrders(map);
  return posts;
}

function movePostToRank(postId, newRank, totalPosts) {
  const map = loadSortOrders();
  // Clamp
  newRank = Math.max(1, Math.min(newRank, totalPosts));
  const oldRank = map[postId];
  if (oldRank === newRank) return;
  // Shift other posts
  if (newRank < oldRank) {
    // moving up: bump down posts that were between newRank and oldRank-1
    Object.keys(map).forEach(id => {
      if (id != postId && map[id] >= newRank && map[id] < oldRank) map[id]++;
    });
  } else {
    // moving down: bump up posts that were between oldRank+1 and newRank
    Object.keys(map).forEach(id => {
      if (id != postId && map[id] > oldRank && map[id] <= newRank) map[id]--;
    });
  }
  map[postId] = newRank;
  saveSortOrders(map);
}

// --- IndexedDB ---

let db;
let commentsDb;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-posts', 2);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        const store = d.createObjectStore('posts', { keyPath: 'id', autoIncrement: true });
        store.createIndex('createdAt', 'createdAt', { unique: false });
      }
      if (oldVersion < 2) {
        const topicStore = d.createObjectStore('topics', { keyPath: 'id', autoIncrement: true });
        topicStore.createIndex('name', 'name', { unique: true });
        const subtopicStore = d.createObjectStore('subtopics', { keyPath: 'id', autoIncrement: true });
        subtopicStore.createIndex('name', 'name', { unique: false });
        subtopicStore.createIndex('topicId', 'topicId', { unique: false });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function openCommentsDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-comments', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('comments')) {
        const store = d.createObjectStore('comments', { keyPath: 'id', autoIncrement: true });
        store.createIndex('postId', 'postId', { unique: false });
        store.createIndex('parentId', 'parentId', { unique: false });
      }
    };
    req.onsuccess = (e) => { commentsDb = e.target.result; resolve(commentsDb); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function getCommentCountsForPosts(postIds) {
  return new Promise((resolve, reject) => {
    const counts = {};
    postIds.forEach(id => { counts[id] = 0; });
    const tx = commentsDb.transaction('comments', 'readonly');
    const store = tx.objectStore('comments').index('postId');
    let pending = postIds.length;
    if (pending === 0) { resolve(counts); return; }
    postIds.forEach(id => {
      const req = store.count(id);
      req.onsuccess = () => {
        counts[id] = req.result;
        if (--pending === 0) resolve(counts);
      };
      req.onerror = () => reject(req.error);
    });
  });
}

function getAllUserPosts() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function getAllTopics() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('topics', 'readonly');
    const req = tx.objectStore('topics').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function getAllSubtopics() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('subtopics', 'readonly');
    const req = tx.objectStore('subtopics').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// --- Helpers ---

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const s = Math.floor(diff / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d >= 365) { const y = Math.floor(d / 365); return y + ' year' + (y !== 1 ? 's' : '') + ' ago'; }
  if (d >= 30)  { const mo = Math.floor(d / 30);  return mo + ' month' + (mo !== 1 ? 's' : '') + ' ago'; }
  if (d >= 1)   return d + ' day' + (d !== 1 ? 's' : '') + ' ago';
  if (h >= 1)   return h + ' hour' + (h !== 1 ? 's' : '') + ' ago';
  if (m >= 1)   return m + ' minute' + (m !== 1 ? 's' : '') + ' ago';
  return 'just now';
}

function postTitleHref(post) {
  if (post.type === 'link') return post.url || '#';
  if (post.type === 'txt') return '/longform/view?id=' + post.id + '&src=user';
  if (post.type === 'file') return '/longform/view?id=' + post.id + '&src=user';
  return '/longform/post.html?id=' + post.id;
}

function postTitleTarget(post) {
  return (post.type === 'link' || post.type === 'txt' || post.type === 'file') ? ' target="_blank" rel="noopener"' : '';
}

function postDomain(post) {
  if (post.type === 'link' && post.url) {
    try { return new URL(post.url).hostname.replace(/^www\./, ''); } catch(e) {}
  }
  if (post.type === 'txt') return 'md';
  if (post.type === 'file') {
    if (post.fileName) {
      const ext = post.fileName.split('.').pop().toLowerCase();
      if (ext) return ext;
    }
    if (post.fileMime) return post.fileMime.split('/').pop().split('+')[0].toLowerCase();
  }
  return post.domain || 'longform';
}

// --- Derive available years and months ---

function getYearsMonths(posts) {
  const map = {};
  posts.forEach(p => {
    const [year, month] = p.date.split('-');
    if (!map[year]) map[year] = new Set();
    map[year].add(month);
  });
  const result = {};
  Object.keys(map).sort((a, b) => b - a).forEach(y => {
    result[y] = [...map[y]].sort((a, b) => a - b);
  });
  return result;
}

const MONTH_NAMES = {
  '01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun',
  '07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'
};

let POSTS = [];
let _yearsMonthsAll = {};
let _allYears = [];

let activeYear = null;
let activeMonth = null;
let activeTopicId = null;
let activeSubtopicId = null;
let currentPage = 1;
const PAGE_SIZE = 30;

let TOPICS = [];
let SUBTOPICS = [];

function rebuildNav() {
  _yearsMonthsAll = getYearsMonths(POSTS);
  _allYears = Object.keys(_yearsMonthsAll).sort((a, b) => b - a);
  renderNav();
  renderTopicNav();
}

function renderNav() {
  const yearBtn = document.getElementById('year-btn');
  const yearDropdown = document.getElementById('year-dropdown');

  yearDropdown.innerHTML = _allYears.map(y =>
    `<a href="#" class="year-option" data-year="${y}">${y}</a>`
  ).join('');

  yearDropdown.querySelectorAll('.year-option').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      activeYear = a.dataset.year;
      activeMonth = null;
      currentPage = 1;
      yearDropdown.style.display = 'none';
      updateYearBtn();
      renderMonths();
      updateActiveStates();
      renderStories();
    });
  });

  yearBtn.onclick = null;
  yearBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (yearDropdown.style.display === 'block') {
      yearDropdown.style.display = 'none';
    } else {
      const rect = yearBtn.getBoundingClientRect();
      yearDropdown.style.top = (rect.bottom + window.scrollY) + 'px';
      yearDropdown.style.left = rect.left + 'px';
      yearDropdown.style.display = 'block';
    }
  });

  document.addEventListener('click', () => {
    yearDropdown.style.display = 'none';
    const td = document.getElementById('topic-dropdown');
    const sd = document.getElementById('subtopic-dropdown');
    if (td) td.style.display = 'none';
    if (sd) sd.style.display = 'none';
  });

  updateYearBtn();
  renderMonths();
}

function updateYearBtn() {
  const yearBtn = document.getElementById('year-btn');
  yearBtn.textContent = (activeYear || 'Year') + ' ▾';
  document.querySelectorAll('.year-option').forEach(a => {
    a.classList.toggle('active-year', a.dataset.year === activeYear);
  });
}

function renderMonths() {
  const monthLinks = document.getElementById('month-links');
  const monthPipe = document.getElementById('month-pipe');
  if (!activeYear || !_yearsMonthsAll[activeYear]) {
    monthLinks.innerHTML = '';
    monthPipe.style.display = 'none';
    return;
  }
  monthPipe.style.display = '';
  const months = _yearsMonthsAll[activeYear];
  monthLinks.innerHTML = months.map((m, i) =>
    (i > 0 ? ' | ' : '') +
    `<a href="#" class="month-link" data-month="${m}">${MONTH_NAMES[m]}</a>`
  ).join('');
  monthLinks.querySelectorAll('.month-link').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      activeMonth = (activeMonth === a.dataset.month) ? null : a.dataset.month;
      currentPage = 1;
      updateActiveStates();
      renderStories();
    });
  });
  updateActiveStates();
}

function renderTopicNav() {
  const topicPipe      = document.getElementById('topic-pipe');
  const topicSelector  = document.getElementById('topic-selector');
  const topicBtn       = document.getElementById('topic-btn');
  const topicDropdown  = document.getElementById('topic-dropdown');
  const subtopicPipe     = document.getElementById('subtopic-pipe');
  const subtopicSelector = document.getElementById('subtopic-selector');
  const subtopicBtn      = document.getElementById('subtopic-btn');
  const subtopicDropdown = document.getElementById('subtopic-dropdown');

  if (TOPICS.length === 0) {
    topicPipe.style.display = 'none';
    topicSelector.style.display = 'none';
    subtopicPipe.style.display = 'none';
    subtopicSelector.style.display = 'none';
    return;
  }

  topicPipe.style.display = '';
  topicSelector.style.display = 'inline-block';

  const activeTopic = TOPICS.find(t => t.id === activeTopicId);
  topicBtn.textContent = (activeTopic ? activeTopic.name : 'Topic') + ' \u25be';

  topicDropdown.innerHTML =
    `<a href="#" class="topic-option" data-topic-id="">All</a>` +
    TOPICS.map(t =>
      `<a href="#" class="topic-option${t.id === activeTopicId ? ' active-topic' : ''}" data-topic-id="${t.id}">${escapeHtml(t.name)}</a>`
    ).join('');

  topicDropdown.querySelectorAll('.topic-option').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const raw = a.dataset.topicId;
      activeTopicId = raw === '' ? null : Number(raw);
      activeSubtopicId = null;
      currentPage = 1;
      topicDropdown.style.display = 'none';
      renderTopicNav();
      renderStories();
    });
  });

  topicBtn.onclick = null;
  topicBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (topicDropdown.style.display === 'block') {
      topicDropdown.style.display = 'none';
    } else {
      const rect = topicBtn.getBoundingClientRect();
      topicDropdown.style.top = (rect.bottom + window.scrollY) + 'px';
      topicDropdown.style.left = rect.left + 'px';
      topicDropdown.style.display = 'block';
    }
  });

  if (activeTopicId === null) {
    subtopicPipe.style.display = 'none';
    subtopicSelector.style.display = 'none';
    return;
  }

  const topicSubtopics = SUBTOPICS.filter(s => s.topicId === activeTopicId);

  if (topicSubtopics.length === 0) {
    subtopicPipe.style.display = 'none';
    subtopicSelector.style.display = 'none';
    return;
  }

  subtopicPipe.style.display = '';
  subtopicSelector.style.display = 'inline-block';

  const activeSubtopic = topicSubtopics.find(s => s.id === activeSubtopicId);
  subtopicBtn.textContent = (activeSubtopic ? activeSubtopic.name : 'Subtopic') + ' \u25be';

  subtopicDropdown.innerHTML =
    `<a href="#" class="subtopic-option" data-subtopic-id="">All</a>` +
    topicSubtopics.map(s =>
      `<a href="#" class="subtopic-option${s.id === activeSubtopicId ? ' active-subtopic' : ''}" data-subtopic-id="${s.id}">${escapeHtml(s.name)}</a>`
    ).join('');

  subtopicDropdown.querySelectorAll('.subtopic-option').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const raw = a.dataset.subtopicId;
      activeSubtopicId = raw === '' ? null : Number(raw);
      currentPage = 1;
      subtopicDropdown.style.display = 'none';
      renderTopicNav();
      renderStories();
    });
  });

  subtopicBtn.onclick = null;
  subtopicBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (subtopicDropdown.style.display === 'block') {
      subtopicDropdown.style.display = 'none';
    } else {
      const rect = subtopicBtn.getBoundingClientRect();
      subtopicDropdown.style.top = (rect.bottom + window.scrollY) + 'px';
      subtopicDropdown.style.left = rect.left + 'px';
      subtopicDropdown.style.display = 'block';
    }
  });
}

function updateActiveStates() {
  document.querySelectorAll('.month-link').forEach(a => {
    a.classList.toggle('active-month', a.dataset.month === activeMonth);
  });
  document.querySelectorAll('.year-option').forEach(a => {
    a.classList.toggle('active-year', a.dataset.year === activeYear);
  });
}

function filteredPosts() {
  const hidden = loadHidden();
  return POSTS.filter(p => {
    if (hidden.has(p.id)) return false;
    const [y, m] = p.date.split('-');
    if (activeYear && y !== activeYear) return false;
    if (activeMonth && m !== activeMonth) return false;
    if (activeTopicId !== null && p.topicId !== activeTopicId) return false;
    if (activeSubtopicId !== null && p.subtopicId !== activeSubtopicId) return false;
    return true;
  });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderStories() {
  const tbody = document.getElementById('story-tbody');
  const allPosts = filteredPosts();
  const start = (currentPage - 1) * PAGE_SIZE;
  const pagePosts = allPosts.slice(start, start + PAGE_SIZE);
  const hasMore = allPosts.length > start + PAGE_SIZE;
  let html = '';

  pagePosts.forEach((post, i) => {
    const rank = start + i + 1;
    const href = escapeHtml(postTitleHref(post));
    const target = postTitleTarget(post);
    const domain = escapeHtml(postDomain(post));
    const isUserPost = !!post.createdAt;
    const agoText = isUserPost ? timeAgo(post.createdAt) : escapeHtml(post.ago || '');
    const commentCount = isUserPost ? (post._commentCount || 0) : (post.comments || 0);

    html += `
      <tr class="athing" id="post-${post.id}" data-post-id="${post.id}" style="height:19px;">
        <td class="title" style="width:22px;text-align:right;vertical-align:top;padding-right:3px;color:#828282;font-size:10pt;">
          <button class="rank-btn" data-post-id="${post.id}" data-rank="${rank}">${rank}.</button>
        </td>
        <td class="votelinks" style="width:14px;vertical-align:top;">
          <a href="#" id="up_${post.id}"><div class="votearrow" title="upvote"></div></a>
        </td>
        <td class="title" style="vertical-align:top;">
          <span class="titleline">
            <a href="${href}"${target}>${escapeHtml(post.title)}</a>
            <span class="sitebit comhead" style="font-size:8pt;color:#828282;"> (<span style="color:#828282;">${domain}</span>)</span>
          </span>
        </td>
      </tr>
      <tr data-post-id="${post.id}">
        <td colspan="2"></td>
        <td class="subtext" style="padding:0;">
          <a href="#">${agoText}</a>
          | <a href="#" class="hide-link" data-post-id="${post.id}">hide</a>
          | <a href="/longform/post.html?id=${post.id}${isUserPost ? '&src=user' : ''}">${commentCount} note${commentCount !== 1 ? 's' : ''}</a>
        </td>
      </tr>
      <tr class="spacer" data-post-id="${post.id}" style="height:5px;"><td></td></tr>`;
  });

  if (allPosts.length === 0) {
    html = `<tr><td colspan="3" style="padding:20px 8px;color:#828282;font-size:10pt;">No posts for this period.</td></tr>`;
  }

  if (hasMore) {
    html += `
      <tr class="morespace" style="height:10px;"><td></td></tr>
      <tr>
        <td colspan="3" class="title hnmore" style="padding:4px 0 8px 38px;">
          <a href="#" id="more-link">More</a>
        </td>
      </tr>`;
  }

  tbody.innerHTML = html;

  // Wire up rank buttons — click shows an inline input
  const totalFiltered = allPosts.length;
  document.querySelectorAll('.rank-btn').forEach(btn => {
    const pid = Number(btn.dataset.postId);
    const currentRank = Number(btn.dataset.rank);

    btn.addEventListener('click', () => {
      // Replace button with a small input pre-filled with current rank
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'rank-input';
      input.value = currentRank;
      btn.replaceWith(input);
      input.select();

      function commit() {
        const raw = input.value.trim();
        // Ignore empty or non-numeric input
        if (raw === '' || !/^-?\d+$/.test(raw)) {
          renderStories();
          return;
        }
        let n = parseInt(raw, 10);
        // Negative -> positive
        if (n < 0) n = Math.abs(n);
        // Zero -> 1
        if (n === 0) n = 1;
        // Cap at list length
        if (n > totalFiltered) n = totalFiltered;
        movePostToRank(pid, n, totalFiltered);
        POSTS = applySortOrders(POSTS);
        renderStories();
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { renderStories(); }
      });
      input.addEventListener('blur', commit);
    });
  });

  // Wire up upvote arrows — move post up one position
  pagePosts.forEach((post, i) => {
    const rank = start + i + 1;
    const upEl = document.getElementById('up_' + post.id);
    if (!upEl) return;
    upEl.addEventListener('click', e => {
      e.preventDefault();
      if (rank <= 1) return;
      movePostToRank(post.id, rank - 1, totalFiltered);
      POSTS = applySortOrders(POSTS);
      renderStories();
    });
  });

  const moreLink = document.getElementById('more-link');
  if (moreLink) {
    moreLink.addEventListener('click', e => {
      e.preventDefault();
      currentPage++;
      renderStories();
      window.scrollTo(0, 0);
    });
  }

  // Wire up hide links
  document.querySelectorAll('.hide-link').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      hidePost(Number(a.dataset.postId));
      renderStories();
    });
  });
}

async function init() {
  await openDB();
  await openCommentsDB();
  const userPosts = await getAllUserPosts();
  const counts = await getCommentCountsForPosts(userPosts.map(p => p.id));
  userPosts.forEach(p => { p._commentCount = counts[p.id] || 0; });
  // Apply stored sort order (defaults to newest-first on first load)
  userPosts.sort((a, b) => b.createdAt - a.createdAt);
  POSTS = applySortOrders(userPosts);
  TOPICS = await getAllTopics();
  SUBTOPICS = await getAllSubtopics();
  rebuildNav();
  renderStories();
  updateHiddenFooter();
}

init();

(function(){
  const name = localStorage.getItem('lf-name');
  if (name) { const el = document.getElementById('site-name'); if (el) el.textContent = name; }
})();

if (window._lfIconSvg !== undefined) {
  const navSvg = document.querySelector('td[style*="width:18px"] svg');
  if (navSvg) navSvg.innerHTML = window._lfIconSvg;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/longform/sw.js', { scope: '/longform/' });
}
</script>
