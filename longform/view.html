<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long Form</title>
  <style>
    /* Light mode defaults */
    :root {
      --bg: #ffffff;
      --fg: #000000;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --fg: #ffffff;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.7;
      padding: 60px 24px 80px;
    }

    #container {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.3;
      margin-bottom: 32px;
      font-family: Georgia, 'Times New Roman', serif;
    }

    #post-body {
      word-break: break-word;
    }

    /* Markdown rendered styles */
    #post-body h1, #post-body h2, #post-body h3,
    #post-body h4, #post-body h5, #post-body h6 {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: bold;
      line-height: 1.3;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }
    #post-body h1 { font-size: 1.6em; }
    #post-body h2 { font-size: 1.3em; }
    #post-body h3 { font-size: 1.1em; }
    #post-body p { margin-bottom: 1em; }
    #post-body ul, #post-body ol {
      margin: 0 0 1em 1.5em;
      padding: 0;
    }
    #post-body li { margin-bottom: 0.25em; }
    #post-body blockquote {
      border-left: 3px solid #ccc;
      margin: 0 0 1em 0;
      padding: 0.25em 1em;
      color: #666;
      font-style: italic;
    }
    @media (prefers-color-scheme: dark) {
      #post-body blockquote { color: #aaa; border-left-color: #555; }
    }
    #post-body code {
      font-family: monospace;
      font-size: 0.9em;
      background: rgba(128,128,128,0.12);
      padding: 0.1em 0.3em;
      border-radius: 3px;
    }
    #post-body pre {
      background: rgba(128,128,128,0.12);
      padding: 1em;
      overflow-x: auto;
      margin-bottom: 1em;
      border-radius: 3px;
    }
    #post-body pre code {
      background: none;
      padding: 0;
    }
    #post-body a { color: inherit; text-decoration: underline; }
    #post-body hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 2em 0;
    }
    #post-body strong { font-weight: bold; }
    #post-body em { font-style: italic; }
    #post-body img { max-width: 100%; height: auto; }

    .not-found {
      font-family: Verdana, Geneva, sans-serif;
      font-size: 12px;
      color: #828282;
    }
  </style>
</head>
<body>

<div id="container">
  <div id="content">Loading...</div>
</div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const postId = parseInt(getParam('id'), 10);
const src = getParam('src'); // 'user' = IndexedDB

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Minimal Markdown -> HTML renderer (no dependencies)
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  function inlineFormat(text) {
    // Code spans (do first to avoid mangling content inside)
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    // Bold + italic ***
    text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // Bold **
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic *
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Bold + italic ___
    text = text.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
    // Bold __
    text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // Italic _
    text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
    // Images ![alt](url) â€” must come before links
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, a, u) =>
      `<img src="${escapeHtml(u)}" alt="${escapeHtml(a)}">`);
    // Links [text](url)
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) =>
      `<a href="${escapeHtml(u)}" target="_blank" rel="noopener">${t}</a>`);
    return text;
  }

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    if (/^```/.test(line)) {
      const lang = line.slice(3).trim();
      let code = '';
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) {
        code += escapeHtml(lines[i]) + '\n';
        i++;
      }
      html += `<pre><code${lang ? ` class="language-${escapeHtml(lang)}"` : ''}>${code}</code></pre>`;
      i++;
      continue;
    }

    // Heading
    const hMatch = line.match(/^(#{1,6})\s+(.*)/);
    if (hMatch) {
      const level = hMatch[1].length;
      html += `<h${level}>${inlineFormat(hMatch[2])}</h${level}>`;
      i++;
      continue;
    }

    // HR
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) {
      html += '<hr>';
      i++;
      continue;
    }

    // Blockquote
    if (/^>\s?/.test(line)) {
      let bq = '';
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        bq += lines[i].replace(/^>\s?/, '') + '\n';
        i++;
      }
      html += `<blockquote>${renderMarkdown(bq.trim())}</blockquote>`;
      continue;
    }

    // Unordered list
    if (/^[-*+]\s/.test(line)) {
      html += '<ul>';
      while (i < lines.length && /^[-*+]\s/.test(lines[i])) {
        html += `<li>${inlineFormat(lines[i].replace(/^[-*+]\s/, ''))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    // Ordered list
    if (/^\d+\.\s/.test(line)) {
      html += '<ol>';
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
        html += `<li>${inlineFormat(lines[i].replace(/^\d+\.\s/, ''))}</li>`;
        i++;
      }
      html += '</ol>';
      continue;
    }

    // Blank line â€” paragraph break
    if (line.trim() === '') {
      i++;
      continue;
    }

    // Paragraph: collect consecutive non-blank, non-block lines
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' &&
           !/^(#{1,6}\s|```|>\s?|[-*+]\s|\d+\.\s)/.test(lines[i]) &&
           !/^(-{3,}|\*{3,}|_{3,})$/.test(lines[i].trim())) {
      if (para) para += ' ';
      para += lines[i];
      i++;
    }
    if (para) html += `<p>${inlineFormat(para)}</p>`;
  }

  return html;
}

function renderTxt(post) {
  document.title = post.title;
  const bodyHtml = renderMarkdown(post.text || '');
  document.getElementById('content').innerHTML =
    `<h1>${escapeHtml(post.title)}</h1><div id="post-body">${bodyHtml}</div>`;
}

function openFile(post) {
  // Convert data URL to blob and redirect â€” browser handles it natively
  fetch(post.fileData)
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      window.location.replace(url);
    });
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-posts', 2);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        d.createObjectStore('posts', { keyPath: 'id', autoIncrement: true });
      }
      if (oldVersion < 2) {
        const topicStore = d.createObjectStore('topics', { keyPath: 'id', autoIncrement: true });
        topicStore.createIndex('name', 'name', { unique: true });
        const subtopicStore = d.createObjectStore('subtopics', { keyPath: 'id', autoIncrement: true });
        subtopicStore.createIndex('name', 'name', { unique: false });
        subtopicStore.createIndex('topicId', 'topicId', { unique: false });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function load() {
  if (!postId || src !== 'user') {
    document.getElementById('content').innerHTML = '<p class="not-found">Post not found.</p>';
    return;
  }

  const db = await openDB();
  const post = await new Promise((resolve, reject) => {
    const tx = db.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').get(postId);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });

  if (!post) {
    document.getElementById('content').innerHTML = '<p class="not-found">Post not found.</p>';
    return;
  }

  if (post.type === 'txt') {
    renderTxt(post);
  } else if (post.type === 'file') {
    openFile(post);
  } else {
    document.getElementById('content').innerHTML = '<p class="not-found">Nothing to view here.</p>';
  }
}

load();
</script>

</body>
</html>
