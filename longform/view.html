<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long Form</title>
  <style>
    /* Light mode defaults */
    :root {
      --bg: #ffffff;
      --fg: #000000;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --fg: #ffffff;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.7;
      padding: 60px 24px 80px;
    }

    #container {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.3;
      margin-bottom: 32px;
      font-family: Georgia, 'Times New Roman', serif;
    }

    #post-body {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .not-found {
      font-family: Verdana, Geneva, sans-serif;
      font-size: 12px;
      color: #828282;
    }
  </style>
</head>
<body>

<div id="container">
  <div id="content">Loading...</div>
</div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const postId = parseInt(getParam('id'), 10);
const src = getParam('src'); // 'user' = IndexedDB

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderTxt(post) {
  document.title = post.title;
  document.getElementById('content').innerHTML =
    `<h1>${escapeHtml(post.title)}</h1><div id="post-body">${escapeHtml(post.text)}</div>`;
}

function openFile(post) {
  // Convert data URL to blob and redirect — browser handles it natively
  fetch(post.fileData)
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      window.location.replace(url);
    });
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('longform-posts', 2);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        d.createObjectStore('posts', { keyPath: 'id', autoIncrement: true });
      }
      if (oldVersion < 2) {
        const topicStore = d.createObjectStore('topics', { keyPath: 'id', autoIncrement: true });
        topicStore.createIndex('name', 'name', { unique: true });
        const subtopicStore = d.createObjectStore('subtopics', { keyPath: 'id', autoIncrement: true });
        subtopicStore.createIndex('name', 'name', { unique: false });
        subtopicStore.createIndex('topicId', 'topicId', { unique: false });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function load() {
  if (!postId || src !== 'user') {
    document.getElementById('content').innerHTML = '<p class="not-found">Post not found.</p>';
    return;
  }

  const db = await openDB();
  const post = await new Promise((resolve, reject) => {
    const tx = db.transaction('posts', 'readonly');
    const req = tx.objectStore('posts').get(postId);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });

  if (!post) {
    document.getElementById('content').innerHTML = '<p class="not-found">Post not found.</p>';
    return;
  }

  if (post.type === 'txt') {
    renderTxt(post);
  } else if (post.type === 'file') {
    openFile(post);
  } else {
    document.getElementById('content').innerHTML = '<p class="not-found">Nothing to view here.</p>';
  }
}

load();
</script>

</body>
</html>
