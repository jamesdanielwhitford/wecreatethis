<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Voice Notes">
  <title>Text Reader — Voice Notes</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent-light: #a855f7;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .navbar-left { display: flex; align-items: center; gap: 4px; }
    .navbar-actions { display: flex; gap: 8px; }

    .navbar-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .icon-btn:hover { color: var(--text); background: var(--border); }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 12px;
    }

    /* Notes list header */
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .notes-header h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .notes-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Note card */
    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .note-card:hover { border-color: rgba(255,255,255,0.15); }

    .note-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 12px 6px;
      gap: 8px;
    }

    .note-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .note-actions {
      display: flex;
      gap: 3px;
    }

    .note-action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 28px;
      min-height: 28px;
      justify-content: center;
      white-space: nowrap;
    }

    .note-action-btn span { display: none; }
    @media (min-width: 480px) { .note-action-btn span { display: inline; } }
    .note-action-btn svg { flex-shrink: 0; }
    .note-action-btn:hover { color: var(--text); background: var(--border); border-color: rgba(255,255,255,0.15); }
    .note-action-btn.danger:hover { color: var(--danger); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }

    .note-divider { height: 1px; background: var(--border); }

    .note-body {
      padding: 8px 12px 12px;
    }

    .note-text-preview {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-word-count {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
    }

    .empty-state svg { opacity: 0.35; margin-bottom: 12px; }
    .empty-state p { font-size: 0.88rem; }

    /* New note fab-style button */
    .new-note-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 10px;
    }

    .new-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }

    .new-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .new-btn:active { transform: scale(0.95); }

    .new-btn-label {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 85dvh;
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 4px;
    }

    .modal h2 { font-size: 1rem; font-weight: 700; }

    .modal textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.7;
      resize: none;
      height: 200px;
      font-family: system-ui, -apple-system, sans-serif;
      flex-shrink: 0;
    }

    .modal textarea:focus { outline: none; border-color: var(--accent); }
    .modal textarea::placeholder { color: var(--text-muted); }

    .modal-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: white;
      flex: 1;
      justify-content: center;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); }

    /* API Key modal (centered) */
    .modal-overlay.centered {
      align-items: center;
      padding: 16px;
    }

    .modal.centered {
      border-radius: 16px;
      max-width: 400px;
      max-height: none;
    }

    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: monospace;
    }

    .modal input:focus { outline: none; border-color: var(--accent); }

    .modal p {
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-left">
      <a href="/voice-notes/" class="icon-btn" title="Back to Voice Notes" aria-label="Back to Voice Notes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <div class="navbar-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5"/>
          <path d="M17 3a2.828 2.828 0 1 1 4 4L12 16l-4 1 1-4 8.828-8.828z"/>
        </svg>
        Text Reader
      </div>
    </div>
    <div class="navbar-actions">
      <button class="icon-btn" id="settingsBtn" title="API Key Settings" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- API Key Modal -->
  <div class="modal-overlay centered hidden" id="apiModal">
    <div class="modal centered">
      <h2>Google Cloud API Key</h2>
      <p>Saved locally. Used to generate speech via Google Cloud Text-to-Speech.</p>
      <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off" spellcheck="false">
      <div class="modal-actions">
        <button class="btn btn-ghost" id="apiModalCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveKeyBtn">Save Key</button>
      </div>
    </div>
  </div>

  <!-- New note modal -->
  <div class="modal-overlay hidden" id="newModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>New reader note</h2>
      <textarea id="newTextInput" placeholder="Paste or type text here..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="newModalCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveNoteBtn">Save note</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="container">
    <!-- New note button -->
    <div class="new-note-section">
      <button class="new-btn" id="newNoteBtn" aria-label="New reader note">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <span class="new-btn-label">New note</span>
    </div>

    <!-- Notes list -->
    <div class="notes-header">
      <h2>Reader Notes</h2>
      <span class="notes-count" id="notesCount">0</span>
    </div>

    <div id="notesList"></div>
  </div>

  <script>
    const STORAGE_KEY = 'reader-notes-v1';
    const API_KEY_STORAGE = 'voice-notes-gcp-key';

    const SVG = {
      trash: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
      noteLg: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5"/><path d="M17 3a2.828 2.828 0 1 1 4 4L12 16l-4 1 1-4 8.828-8.828z"/></svg>`,
    };

    function loadNotes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }

    function saveNotes(notes) { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
    function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ''; }
    function saveApiKey(key) { localStorage.setItem(API_KEY_STORAGE, key.trim()); }

    function showToast(msg, duration = 2200) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timeout);
      t._timeout = setTimeout(() => t.classList.remove('show'), duration);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (d.toDateString() === now.toDateString()) return `Today ${time}`;
      if (d.toDateString() === yesterday.toDateString()) return `Yesterday ${time}`;
      return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' + time;
    }

    function wordCount(text) {
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function makeActionBtn(label, iconHtml, type, onClick) {
      const btn = document.createElement('button');
      btn.className = `note-action-btn${type ? ' ' + type : ''}`;
      btn.innerHTML = `${iconHtml}<span>${label}</span>`;
      btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); onClick(); });
      return btn;
    }

    function buildNoteCard(note) {
      const a = document.createElement('a');
      a.className = 'note-card';
      a.href = `reader-note?id=${note.id}`;

      const header = document.createElement('div');
      header.className = 'note-header';

      const dateEl = document.createElement('div');
      dateEl.className = 'note-date';
      dateEl.textContent = formatDate(note.createdAt);

      const actions = document.createElement('div');
      actions.className = 'note-actions';
      actions.appendChild(makeActionBtn('Delete', SVG.trash, 'danger', () => deleteNote(note.id)));

      header.appendChild(dateEl);
      header.appendChild(actions);
      a.appendChild(header);

      const divider = document.createElement('div');
      divider.className = 'note-divider';
      a.appendChild(divider);

      const body = document.createElement('div');
      body.className = 'note-body';

      const preview = document.createElement('div');
      preview.className = 'note-text-preview';
      preview.textContent = note.text;
      body.appendChild(preview);

      const wc = document.createElement('div');
      wc.className = 'note-word-count';
      wc.textContent = `${wordCount(note.text).toLocaleString()} words`;
      body.appendChild(wc);

      a.appendChild(body);
      return a;
    }

    function renderNotes() {
      const notes = loadNotes();
      const list = document.getElementById('notesList');
      list.innerHTML = '';
      document.getElementById('notesCount').textContent = notes.length;

      if (notes.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `${SVG.noteLg}<p>No reader notes yet. Tap + to add text.</p>`;
        list.appendChild(empty);
        return;
      }

      notes.forEach(note => list.appendChild(buildNoteCard(note)));
    }

    function deleteNote(noteId) {
      if (!confirm('Delete this note?')) return;
      const notes = loadNotes().filter(n => n.id !== noteId);
      saveNotes(notes);
      renderNotes();
      showToast('Note deleted');
    }

    // New note modal
    document.getElementById('newNoteBtn').addEventListener('click', () => {
      document.getElementById('newTextInput').value = '';
      document.getElementById('newModal').classList.remove('hidden');
      setTimeout(() => document.getElementById('newTextInput').focus(), 50);
    });

    document.getElementById('newModalCancelBtn').addEventListener('click', () => {
      document.getElementById('newModal').classList.add('hidden');
    });

    document.getElementById('newModal').addEventListener('click', e => {
      if (e.target === document.getElementById('newModal')) {
        document.getElementById('newModal').classList.add('hidden');
      }
    });

    document.getElementById('saveNoteBtn').addEventListener('click', () => {
      const text = document.getElementById('newTextInput').value.trim();
      if (!text) { showToast('Enter some text first'); return; }
      const notes = loadNotes();
      const note = { id: Date.now().toString(), createdAt: new Date().toISOString(), text };
      notes.unshift(note);
      saveNotes(notes);
      document.getElementById('newModal').classList.add('hidden');
      renderNotes();
      // Navigate straight to detail page
      window.location.href = `reader-note?id=${note.id}`;
    });

    // API Key modal
    document.getElementById('settingsBtn').addEventListener('click', () => {
      document.getElementById('apiKeyInput').value = getApiKey();
      document.getElementById('apiModal').classList.remove('hidden');
    });

    document.getElementById('apiModalCancelBtn').addEventListener('click', () => {
      document.getElementById('apiModal').classList.add('hidden');
    });

    document.getElementById('apiModal').addEventListener('click', e => {
      if (e.target === document.getElementById('apiModal')) document.getElementById('apiModal').classList.add('hidden');
    });

    document.getElementById('saveKeyBtn').addEventListener('click', () => {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) { showToast('Please enter your API key'); return; }
      saveApiKey(key);
      document.getElementById('apiModal').classList.add('hidden');
      showToast('API key saved');
    });

    // Init
    if (!getApiKey()) {
      saveApiKey('AIzaSyCOBDj6tZblWaiJeYzQ0SfaMECbkRjeHd4');
    }

    renderNotes();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/voice-notes/sw.js', { scope: '/voice-notes/' });
    }
  </script>
</body>
</html>
