<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Voice Notes">
  <title>Voice Notes</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent-light: #a855f7;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --record-red: #ff3b30;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .navbar-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .navbar-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
    }

    .icon-btn:hover { color: var(--text); background: var(--border); }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 12px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
    }

    .modal h2 { font-size: 1.1rem; margin-bottom: 8px; }

    .modal p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 12px;
      font-family: monospace;
    }

    .modal input:focus { outline: none; border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: white;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    /* Record section */
    .record-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
      gap: 14px;
    }

    .record-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.2s;
      background: var(--record-red);
      box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4);
      overflow: hidden;
    }

    .record-btn.recording { animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); }
      70%  { box-shadow: 0 0 0 20px rgba(255, 59, 48, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }

    .record-btn:hover { transform: scale(1.05); }
    .record-btn:active { transform: scale(0.95); }

    .record-btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      width: 32px;
      height: 32px;
    }

    .record-btn-icon svg { display: block; }

    .record-status { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .record-status.recording { color: var(--record-red); }

    .record-timer {
      font-size: 1.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      letter-spacing: 0.05em;
      min-height: 1.8rem;
    }

    /* Notes list */
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .notes-header h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .notes-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
    }

    .empty-state svg { opacity: 0.35; margin-bottom: 12px; }
    .empty-state p { font-size: 0.88rem; }

    /* Note card */
    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .note-card:hover { border-color: rgba(255,255,255,0.15); }

    .note-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 12px 6px;
      gap: 8px;
    }

    .note-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .note-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: flex-end;
    }

    .note-action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 28px;
      min-height: 28px;
      justify-content: center;
      white-space: nowrap;
    }

    .note-action-btn span { display: none; }

    @media (min-width: 480px) {
      .note-action-btn span { display: inline; }
    }

    .note-action-btn svg { flex-shrink: 0; }

    .note-action-btn:hover { color: var(--text); background: var(--border); border-color: rgba(255,255,255,0.15); }
    .note-action-btn.danger:hover { color: var(--danger); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
    .note-action-btn.success:hover { color: var(--success); background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }

    /* Transcript */
    .note-transcript {
      padding: 8px 12px 12px;
      border-top: 1px solid var(--border);
    }

    .transcript-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .transcript-text {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Live streaming transcript — no line clamp, cursor blink */
    .transcript-text.streaming {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .transcript-text.streaming::after {
      content: '|';
      display: inline-block;
      animation: blink 1s step-end infinite;
      color: var(--accent-light);
      margin-left: 1px;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .read-more-link {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.78rem;
      color: var(--accent-light);
      text-decoration: none;
      font-weight: 600;
    }

    .read-more-link:hover { text-decoration: underline; }

    .transcript-pending {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .transcript-error {
      font-size: 0.8rem;
      color: var(--warning);
      word-break: break-word;
    }

    .spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    .note-divider { height: 1px; background: var(--border); }

    /* No API key banner */
    .no-key-banner {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--warning);
      margin-bottom: 14px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    .no-key-banner svg { flex-shrink: 0; margin-top: 1px; }

    .no-key-banner button {
      background: none;
      border: none;
      color: var(--warning);
      cursor: pointer;
      font-size: inherit;
      font-weight: 700;
      text-decoration: underline;
      padding: 0;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
      Voice Notes
    </div>
    <div class="navbar-actions">
      <button class="icon-btn" id="settingsBtn" title="API Key Settings" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- API Key Modal -->
  <div class="modal-overlay hidden" id="apiModal">
    <div class="modal">
      <h2>Mistral API Key</h2>
      <p>Your API key is saved locally in your browser. It's used to transcribe voice notes using Voxtral.</p>
      <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" id="saveKeyBtn">Save Key</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <div class="container">
    <!-- No key banner -->
    <div class="no-key-banner" id="noKeyBanner" style="display:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>No API key set. <button id="bannerKeyBtn">Add your Mistral API key</button> to enable transcription.</span>
    </div>

    <!-- Record section -->
    <div class="record-section">
      <div class="record-timer" id="recordTimer"></div>
      <button class="record-btn" id="recordBtn" title="Record voice note" aria-label="Start recording">
        <div class="record-btn-icon" id="recordBtnIcon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </div>
      </button>
      <div class="record-status" id="recordStatus">Tap to record</div>
    </div>

    <!-- Notes list -->
    <div class="notes-header">
      <h2>Notes</h2>
      <span class="notes-count" id="notesCount">0</span>
    </div>

    <div id="notesList"></div>
  </div>

  <script>
    const STORAGE_KEY = 'voice-notes-v1';
    const API_KEY_STORAGE = 'voice-notes-mistral-key';
    const MODEL = 'voxtral-mini-latest';
    const ENDPOINT = 'https://api.mistral.ai/v1/audio/transcriptions';

    const SVG = {
      mic: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`,
      stop: `<svg width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="none"><rect x="4" y="4" width="16" height="16" rx="3"/></svg>`,
      copy:    `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
      refresh: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`,
      trash:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
      micLg: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`,
    };

    const SEGMENT_INTERVAL = 30; // seconds between mid-recording transcriptions

    let notes = [];
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];       // all chunks for full-recording fallback blob
    let segmentChunks = [];     // chunks for the current 30s segment
    let timerInterval = null;
    let timerSeconds = 0;
    let segmentInterval = null; // setInterval handle for 30s segments
    let activeNoteId = null;    // note being recorded/transcribed

    // --- IndexedDB audio fallback store ---
    let audioDB = null;

    function openAudioDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('voice-notes-audio', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('blobs', { keyPath: 'id' });
        req.onsuccess = e => { audioDB = e.target.result; resolve(audioDB); };
        req.onerror = () => reject(req.error);
      });
    }

    async function saveAudioBlob(noteId, blob, mimeType) {
      const db = audioDB || await openAudioDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('blobs', 'readwrite');
        tx.objectStore('blobs').put({ id: noteId, blob, mimeType });
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getAudioBlob(noteId) {
      const db = audioDB || await openAudioDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('blobs', 'readonly');
        const req = tx.objectStore('blobs').get(noteId);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    async function deleteAudioBlob(noteId) {
      const db = audioDB || await openAudioDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('blobs', 'readwrite');
        tx.objectStore('blobs').delete(noteId);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    // --- Notes store ---
    function loadNotes() {
      try { notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { notes = []; }
    }

    function saveNotes() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
    function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ''; }
    function saveApiKey(key) { localStorage.setItem(API_KEY_STORAGE, key.trim()); }

    function showToast(msg, duration = 2200) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timeout);
      t._timeout = setTimeout(() => t.classList.remove('show'), duration);
    }

    function formatTime(secs) {
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function startTimer() {
      timerSeconds = 0;
      document.getElementById('recordTimer').textContent = '00:00';
      timerInterval = setInterval(() => {
        timerSeconds++;
        document.getElementById('recordTimer').textContent = formatTime(timerSeconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      document.getElementById('recordTimer').textContent = '';
    }

    function setRecordIcon(which) {
      document.getElementById('recordBtnIcon').innerHTML = SVG[which];
    }

    async function startRecording() {
      if (!getApiKey()) {
        showToast('Add your API key first');
        openModal();
        return;
      }

      let stream;
      try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
      catch { showToast('Microphone access denied'); return; }

      audioChunks = [];
      segmentChunks = [];
      activeNoteId = null;
      const options = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? { mimeType: 'audio/webm;codecs=opus' }
        : MediaRecorder.isTypeSupported('audio/webm') ? { mimeType: 'audio/webm' } : {};

      mediaRecorder = new MediaRecorder(stream, options);
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) {
          audioChunks.push(e.data);
          segmentChunks.push(e.data);
        }
      };
      mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); handleRecordingDone(); };
      mediaRecorder.start(100);

      isRecording = true;
      document.getElementById('recordBtn').classList.add('recording');
      setRecordIcon('stop');
      document.getElementById('recordStatus').textContent = 'Recording... tap to stop';
      document.getElementById('recordStatus').classList.add('recording');
      startTimer();

      // Every 30s, flush current segment for transcription
      segmentInterval = setInterval(() => flushSegment(false), SEGMENT_INTERVAL * 1000);
    }

    function stopRecording() {
      clearInterval(segmentInterval);
      segmentInterval = null;
      // activeNoteId stays set so handleRecordingDone can use it
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      isRecording = false;
      document.getElementById('recordBtn').classList.remove('recording');
      setRecordIcon('mic');
      document.getElementById('recordStatus').textContent = 'Tap to record';
      document.getElementById('recordStatus').classList.remove('recording');
      stopTimer();
    }

    async function handleRecordingDone() {
      const mimeType = mediaRecorder.mimeType || 'audio/webm';

      // Create the note first if this is a short recording (< 30s, no segments sent yet)
      if (!activeNoteId) {
        const note = {
          id: Date.now().toString(),
          createdAt: new Date().toISOString(),
          transcript: null,
          transcriptStatus: 'streaming',
          transcriptError: null,
          duration: timerSeconds,
          audioMime: mimeType,
        };
        notes.unshift(note);
        saveNotes();
        renderNotes();
        activeNoteId = note.id;

        // Save full blob as fallback
        const blob = new Blob(audioChunks, { type: mimeType });
        await saveAudioBlob(note.id, blob, mimeType);
      }

      // Send the remaining segment (final)
      flushSegment(true);
    }

    // Flush current segmentChunks as a transcription request.
    // isFinal=true means this is the last segment — sets status to done when complete.
    async function flushSegment(isFinal) {
      const mimeType = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
      const chunks = segmentChunks.splice(0); // take and clear
      if (chunks.length === 0) {
        // Nothing to send — if final, just mark done
        if (isFinal && activeNoteId) {
          const note = notes.find(n => n.id === activeNoteId);
          if (note && note.transcriptStatus === 'streaming') {
            note.transcriptStatus = note.transcript ? 'done' : 'error';
            note.transcriptError = note.transcript ? null : 'No transcript received';
            if (note.transcriptStatus === 'done') deleteAudioBlob(activeNoteId);
            saveNotes();
            updateNoteInDOM(activeNoteId);
          }
          activeNoteId = null;
        }
        return;
      }

      const blob = new Blob(chunks, { type: mimeType });

      // Create the note on first segment if not yet created
      if (!activeNoteId) {
        const note = {
          id: Date.now().toString(),
          createdAt: new Date().toISOString(),
          transcript: null,
          transcriptStatus: 'streaming',
          transcriptError: null,
          duration: timerSeconds,
          audioMime: mimeType,
        };
        notes.unshift(note);
        saveNotes();
        renderNotes();
        activeNoteId = note.id;

        // Save full recording blob as fallback (using all chunks so far)
        const fullBlob = new Blob(audioChunks, { type: mimeType });
        await saveAudioBlob(note.id, fullBlob, mimeType);
      }

      await streamTranscribe(activeNoteId, blob, isFinal);
      if (isFinal) activeNoteId = null;
    }

    async function streamTranscribe(noteId, blob, isFinal = true) {
      const note = notes.find(n => n.id === noteId);
      if (!note) return;

      const apiKey = getApiKey();
      if (!apiKey) return;

      const ext = note.audioMime.includes('webm') ? 'webm'
        : note.audioMime.includes('ogg') ? 'ogg'
        : note.audioMime.includes('mp4') ? 'mp4' : 'webm';

      const formData = new FormData();
      formData.append('file', blob, `recording.${ext}`);
      formData.append('model', MODEL);
      formData.append('stream', 'true');

      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Accept': 'text/event-stream',
          },
          body: formData,
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.message || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let segmentText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.slice(6));
              if (evt.type === 'transcription.text.delta' && evt.text) {
                segmentText += evt.text;
                note.transcript = (note.transcript || '') + evt.text;
                saveNotes();
                updateNoteInDOM(note.id);
              } else if (evt.type === 'transcription.done') {
                // If done event has full text, use it to correct our built-up segment
                if (evt.text && evt.text !== segmentText) {
                  // Replace the segment portion we appended with the corrected version
                  const existing = note.transcript || '';
                  note.transcript = existing.slice(0, existing.length - segmentText.length) + evt.text;
                }
                if (isFinal) {
                  note.transcriptStatus = 'done';
                  deleteAudioBlob(note.id);
                }
                saveNotes();
                updateNoteInDOM(note.id);
              }
            } catch {}
          }
        }

        // Stream ended without transcription.done
        if (isFinal && note.transcriptStatus === 'streaming') {
          note.transcriptStatus = note.transcript ? 'done' : 'error';
          note.transcriptError = note.transcript ? null : 'No transcript received';
          if (note.transcriptStatus === 'done') deleteAudioBlob(note.id);
          saveNotes();
          updateNoteInDOM(note.id);
        }

      } catch (e) {
        if (isFinal) {
          note.transcriptStatus = 'error';
          note.transcriptError = e.message;
          saveNotes();
          updateNoteInDOM(note.id);
        }
        // For mid-recording segment errors, silently continue — next segment will still try
      }
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (d.toDateString() === now.toDateString()) return `Today ${time}`;
      if (d.toDateString() === yesterday.toDateString()) return `Yesterday ${time}`;
      return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' + time;
    }

    function buildNoteCard(note) {
      const card = document.createElement('div');
      card.className = 'note-card';
      card.dataset.id = note.id;

      // Header
      const header = document.createElement('div');
      header.className = 'note-header';

      const dateEl = document.createElement('div');
      dateEl.className = 'note-date';
      dateEl.textContent = formatDate(note.createdAt);

      const actions = document.createElement('div');
      actions.className = 'note-actions';

      if (note.transcript) {
        actions.appendChild(makeActionBtn('Copy', SVG.copy, 'success', () => {
          navigator.clipboard.writeText(note.transcript).then(() => showToast('Copied'));
        }));
      }

      actions.appendChild(makeActionBtn('Delete', SVG.trash, 'danger', () => deleteNote(note.id)));

      header.appendChild(dateEl);
      header.appendChild(actions);
      card.appendChild(header);

      const divider = document.createElement('div');
      divider.className = 'note-divider';
      card.appendChild(divider);

      // Transcript
      const ts = document.createElement('div');
      ts.className = 'note-transcript';

      const label = document.createElement('div');
      label.className = 'transcript-label';

      if (note.transcriptStatus === 'streaming') {
        label.innerHTML = '<div class="spinner"></div> Transcribing...';
        ts.appendChild(label);
        if (note.transcript) {
          const text = document.createElement('div');
          text.className = 'transcript-text streaming';
          text.textContent = note.transcript;
          ts.appendChild(text);
        } else {
          const p = document.createElement('div');
          p.className = 'transcript-pending';
          p.textContent = 'Processing your voice note...';
          ts.appendChild(p);
        }
      } else if (note.transcriptStatus === 'done' && note.transcript) {
        label.textContent = 'Transcript';
        const text = document.createElement('div');
        text.className = 'transcript-text';
        text.textContent = note.transcript;
        ts.appendChild(label);
        ts.appendChild(text);
        const readMore = document.createElement('a');
        readMore.className = 'read-more-link';
        readMore.href = `note?id=${note.id}`;
        readMore.textContent = 'Read more';
        ts.appendChild(readMore);
      } else if (note.transcriptStatus === 'error') {
        label.textContent = 'Transcript';
        const err = document.createElement('div');
        err.className = 'transcript-error';
        err.textContent = `Transcription failed: ${note.transcriptError || 'Unknown error'}`;
        ts.appendChild(label);
        ts.appendChild(err);
        // Show retry button if we still have the audio blob
        getAudioBlob(note.id).then(stored => {
          if (stored) {
            const retryBtn = makeActionBtn('Retry', SVG.refresh, '', () => retryTranscribe(note.id));
            // Insert before the existing delete button in actions
            const actionsEl = card.querySelector('.note-actions');
            if (actionsEl) actionsEl.insertBefore(retryBtn, actionsEl.firstChild);
          }
        });
      } else {
        label.textContent = 'Transcript';
        const p = document.createElement('div');
        p.className = 'transcript-pending';
        p.textContent = 'No transcript available.';
        ts.appendChild(label);
        ts.appendChild(p);
      }

      card.appendChild(ts);
      return card;
    }

    function makeActionBtn(label, iconHtml, type, onClick) {
      const btn = document.createElement('button');
      btn.className = `note-action-btn${type ? ' ' + type : ''}`;
      btn.innerHTML = `${iconHtml}<span>${label}</span>`;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function renderNotes() {
      const list = document.getElementById('notesList');
      list.innerHTML = '';
      document.getElementById('notesCount').textContent = notes.length;

      if (notes.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `${SVG.micLg}<p>No voice notes yet. Tap the button above to record.</p>`;
        list.appendChild(empty);
        return;
      }

      notes.forEach(note => list.appendChild(buildNoteCard(note)));
    }

    function updateNoteInDOM(noteId) {
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      const existing = document.querySelector(`.note-card[data-id="${noteId}"]`);
      if (!existing) { renderNotes(); return; }
      existing.replaceWith(buildNoteCard(note));
    }

    async function retryTranscribe(noteId) {
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      const stored = await getAudioBlob(noteId);
      if (!stored) { showToast('Audio no longer available'); return; }
      note.transcriptStatus = 'streaming';
      note.transcriptError = null;
      note.transcript = null;
      saveNotes();
      updateNoteInDOM(note.id);
      const blob = stored.blob instanceof Blob ? stored.blob : new Blob([stored.blob], { type: stored.mimeType });
      streamTranscribe(noteId, blob);
    }

    function deleteNote(noteId) {
      if (!confirm('Delete this note?')) return;
      notes = notes.filter(n => n.id !== noteId);
      saveNotes();
      deleteAudioBlob(noteId);
      document.getElementById('notesCount').textContent = notes.length;
      const card = document.querySelector(`.note-card[data-id="${noteId}"]`);
      if (card) card.remove();
      if (notes.length === 0) renderNotes();
      showToast('Note deleted');
    }

    function checkApiKeyBanner() {
      const banner = document.getElementById('noKeyBanner');
      banner.style.display = getApiKey() ? 'none' : 'flex';
    }

    // Modal
    document.getElementById('settingsBtn').addEventListener('click', openModal);
    document.getElementById('bannerKeyBtn').addEventListener('click', openModal);
    document.getElementById('apiModal').addEventListener('click', e => {
      if (e.target === document.getElementById('apiModal')) closeModal();
    });
    document.getElementById('saveKeyBtn').addEventListener('click', () => {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) { showToast('Please enter your API key'); return; }
      saveApiKey(key);
      closeModal();
      showToast('API key saved');
      checkApiKeyBanner();
    });

    function openModal() {
      document.getElementById('apiKeyInput').value = getApiKey();
      document.getElementById('apiModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('apiModal').classList.add('hidden'); }

    document.getElementById('recordBtn').addEventListener('click', () => {
      if (isRecording) stopRecording(); else startRecording();
    });

    // Init
    openAudioDB().catch(() => {}); // warm up DB connection
    loadNotes();
    renderNotes();
    checkApiKeyBanner();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/voice-notes/sw.js', { scope: '/voice-notes/' });
    }
  </script>
</body>
</html>
