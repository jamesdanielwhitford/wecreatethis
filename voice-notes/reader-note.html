<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Voice Notes">
  <title>Reader Note — Voice Notes</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent-light: #a855f7;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      text-decoration: none;
    }

    .back-btn:hover { color: var(--text); background: var(--border); }

    .navbar-title {
      font-size: 1rem;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Sticky player panel — sits just below navbar */
    .player-panel {
      position: sticky;
      top: 52px;
      z-index: 90;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .player-panel-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 10px 16px 12px;
    }

    /* Voice + Speak row */
    .controls-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .voice-select {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .voice-select:focus { outline: none; border-color: var(--accent); }
    .voice-select option { background: var(--surface); }

    .speak-btn {
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .speak-btn:hover:not(:disabled) { opacity: 0.85; }
    .speak-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading bar */
    .loading-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
      display: none;
    }

    .loading-bar.visible { display: block; }

    .loading-fill {
      height: 100%;
      background: var(--accent-light);
      border-radius: 2px;
      animation: loading-pulse 1.2s ease-in-out infinite;
      width: 40%;
    }

    @keyframes loading-pulse {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Progress + transport — hidden until audio loaded */
    .transport { display: none; }
    .transport.visible { display: block; }

    .progress-wrap { margin-bottom: 8px; }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-light);
      border-radius: 2px;
      transition: width 0.3s linear;
      width: 0%;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .progress-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 10px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover { color: var(--text); background: var(--border); }
    .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .ctrl-btn.play-pause {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      margin: 0 4px;
    }

    .ctrl-btn.play-pause:hover { opacity: 0.85; background: var(--accent); }

    .skip-label {
      font-size: 0.58rem;
      font-weight: 700;
      display: block;
      margin-top: 1px;
    }

    .ctrl-btn-skip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .player-status {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
      min-height: 1em;
    }

    /* Text + actions below */
    .note-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* Text display */
    .text-display {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .word { transition: background 0.1s, color 0.1s; border-radius: 3px; padding: 0 1px; }
    .word.active { background: var(--accent); color: white; }

    /* Actions row */
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      padding-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 9px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: none;
      color: var(--text-muted);
      transition: color 0.2s, background 0.2s, border-color 0.2s, opacity 0.2s;
    }

    .btn:hover { color: var(--text); background: var(--border); border-color: rgba(255,255,255,0.15); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-success:hover { color: var(--success); background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }
    .btn-danger:hover { color: var(--danger); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    .not-found {
      text-align: center;
      padding: 60px 16px;
      color: var(--text-muted);
    }

    .not-found p { font-size: 0.9rem; margin-top: 10px; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/voice-notes/reader" class="back-btn" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <div class="navbar-title" id="navTitle">Reader Note</div>
  </nav>

  <div class="toast" id="toast"></div>

  <!-- Sticky player panel -->
  <div class="player-panel">
    <div class="player-panel-inner">
      <!-- Voice + Speak -->
      <div class="controls-row">
        <select class="voice-select" id="voiceSelect">
          <option value="en-US-Neural2-A">US English - Neural2 A (female)</option>
          <option value="en-US-Neural2-D" selected>US English - Neural2 D (male)</option>
          <option value="en-US-Neural2-E">US English - Neural2 E (female)</option>
          <option value="en-US-Neural2-F">US English - Neural2 F (female)</option>
          <option value="en-US-Neural2-G">US English - Neural2 G (female)</option>
          <option value="en-US-Neural2-H">US English - Neural2 H (female)</option>
          <option value="en-US-Neural2-I">US English - Neural2 I (male)</option>
          <option value="en-US-Neural2-J">US English - Neural2 J (male)</option>
          <option value="en-GB-Neural2-A">GB English - Neural2 A (female)</option>
          <option value="en-GB-Neural2-B">GB English - Neural2 B (male)</option>
          <option value="en-GB-Neural2-C">GB English - Neural2 C (female)</option>
          <option value="en-GB-Neural2-D">GB English - Neural2 D (male)</option>
          <option value="en-AU-Neural2-A">AU English - Neural2 A (female)</option>
          <option value="en-AU-Neural2-B">AU English - Neural2 B (male)</option>
        </select>
        <button class="speak-btn" id="speakBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          Speak
        </button>
      </div>

      <!-- Loading bar -->
      <div class="loading-bar" id="loadingBar"><div class="loading-fill"></div></div>

      <!-- Transport controls — shown once audio is ready -->
      <div class="transport" id="transport">
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-times">
            <span class="progress-time" id="currentTime">0:00</span>
            <span class="progress-time" id="totalTime">0:00</span>
          </div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn" id="skipBackBtn" title="Skip back 10s">
            <div class="ctrl-btn-skip">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 .49-3.35"/>
              </svg>
              <span class="skip-label">10</span>
            </div>
          </button>
          <button class="ctrl-btn play-pause" id="playPauseBtn" title="Play / Pause">
            <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="white" stroke="none">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="white" stroke="none" style="display:none">
              <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="skipFwdBtn" title="Skip forward 10s">
            <div class="ctrl-btn-skip">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              <span class="skip-label">10</span>
            </div>
          </button>
        </div>
        <div class="player-status" id="playerStatus"></div>
      </div>
    </div>
  </div>

  <div class="container" id="content"></div>

  <script>
    const STORAGE_KEY = 'reader-notes-v1';
    const API_KEY_STORAGE = 'voice-notes-gcp-key';
    const TTS_ENDPOINT = 'https://texttospeech.googleapis.com/v1/text:synthesize';

    function loadNotes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }

    function saveNotes(notes) { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
    function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ''; }

    function showToast(msg, duration = 2200) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timeout);
      t._timeout = setTimeout(() => t.classList.remove('show'), duration);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (d.toDateString() === now.toDateString()) return `Today at ${time}`;
      if (d.toDateString() === yesterday.toDateString()) return `Yesterday at ${time}`;
      return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) + ' at ' + time;
    }

    // --- Audio state ---
    let audioCtx = null;
    let audioBuffer = null;
    let sourceNode = null;
    let startTime = 0;
    let pauseOffset = 0;
    let isPlaying = false;
    let duration = 0;
    let rafId = null;
    let wordTimings = [];
    let activeWordIndex = -1;

    function formatSecs(s) {
      const m = Math.floor(s / 60);
      const sec = String(Math.floor(s % 60)).padStart(2, '0');
      return `${m}:${sec}`;
    }

    function setPlayPauseIcon(playing) {
      document.getElementById('playIcon').style.display = playing ? 'none' : 'block';
      document.getElementById('pauseIcon').style.display = playing ? 'block' : 'none';
    }

    function updateProgress() {
      if (!isPlaying || !audioBuffer) return;
      const elapsed = (audioCtx.currentTime - startTime) + pauseOffset;
      const clamped = Math.min(elapsed, duration);
      document.getElementById('progressFill').style.width = (duration > 0 ? clamped / duration * 100 : 0) + '%';
      document.getElementById('currentTime').textContent = formatSecs(clamped);
      highlightWord(clamped);
      if (elapsed < duration) rafId = requestAnimationFrame(updateProgress);
    }

    function highlightWord(elapsed) {
      if (!wordTimings.length) return;
      let lo = 0, hi = wordTimings.length - 1, found = -1;
      while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (wordTimings[mid].start <= elapsed) { found = mid; lo = mid + 1; }
        else hi = mid - 1;
      }
      if (found === -1 || wordTimings[found].index === activeWordIndex) return;
      const allWords = document.querySelectorAll('#textDisplay .word');
      if (activeWordIndex >= 0 && allWords[activeWordIndex]) allWords[activeWordIndex].classList.remove('active');
      activeWordIndex = wordTimings[found].index;
      if (allWords[activeWordIndex]) allWords[activeWordIndex].classList.add('active');
    }

    function buildWordTimings(text, totalDuration) {
      const wordTokens = text.trim().split(/\s+/).filter(Boolean);
      const totalChars = wordTokens.reduce((acc, w) => acc + w.length, 0);
      const timings = [];
      let cursor = 0;
      wordTokens.forEach((w, i) => {
        const wordDur = (w.length / totalChars) * totalDuration;
        timings.push({ start: cursor, index: i });
        cursor += wordDur;
      });
      return timings;
    }

    function renderTextDisplay(text) {
      const display = document.getElementById('textDisplay');
      const tokens = text.split(/(\s+)/);
      display.innerHTML = '';
      tokens.forEach(token => {
        if (token.trim().length > 0) {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = token;
          display.appendChild(span);
        } else {
          display.appendChild(document.createTextNode(token));
        }
      });
    }

    async function playFromOffset(offset) {
      if (sourceNode) { sourceNode.onended = null; sourceNode.stop(); sourceNode = null; }
      if (!audioBuffer) return;
      pauseOffset = Math.max(0, Math.min(offset, duration));
      // Always resume context first — fixes silent-first-play on Chrome/mobile
      if (audioCtx.state !== 'running') await audioCtx.resume();
      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.connect(audioCtx.destination);
      sourceNode.start(0, pauseOffset);
      startTime = audioCtx.currentTime;
      isPlaying = true;
      setPlayPauseIcon(true);
      document.getElementById('playerStatus').textContent = '';
      sourceNode.onended = () => {
        const elapsed = (audioCtx.currentTime - startTime) + pauseOffset;
        if (elapsed >= duration - 0.1) {
          isPlaying = false;
          pauseOffset = 0;
          activeWordIndex = -1;
          setPlayPauseIcon(false);
          cancelAnimationFrame(rafId);
          document.getElementById('progressFill').style.width = '100%';
          document.getElementById('currentTime').textContent = formatSecs(duration);
          document.getElementById('playerStatus').textContent = 'Finished';
          document.querySelectorAll('#textDisplay .word').forEach(w => w.classList.remove('active'));
        }
      };
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(updateProgress);
    }

    function pauseAudio() {
      if (!isPlaying || !sourceNode) return;
      pauseOffset = (audioCtx.currentTime - startTime) + pauseOffset;
      sourceNode.onended = null;
      sourceNode.stop();
      sourceNode = null;
      isPlaying = false;
      setPlayPauseIcon(false);
      cancelAnimationFrame(rafId);
    }

    function stopAudio() {
      if (sourceNode) { sourceNode.onended = null; sourceNode.stop(); sourceNode = null; }
      isPlaying = false;
      pauseOffset = 0;
      audioBuffer = null;
      duration = 0;
      activeWordIndex = -1;
      cancelAnimationFrame(rafId);
      setPlayPauseIcon(false);
      document.getElementById('transport').classList.remove('visible');
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('currentTime').textContent = '0:00';
      document.getElementById('totalTime').textContent = '0:00';
      document.getElementById('playerStatus').textContent = '';
    }

    // Player controls
    document.getElementById('playPauseBtn').addEventListener('click', () => {
      if (!audioBuffer) return;
      if (isPlaying) pauseAudio();
      else playFromOffset(pauseOffset);
    });

    document.getElementById('skipBackBtn').addEventListener('click', () => {
      if (!audioBuffer) return;
      const current = isPlaying ? (audioCtx.currentTime - startTime) + pauseOffset : pauseOffset;
      if (isPlaying) playFromOffset(current - 10);
      else {
        pauseOffset = Math.max(0, current - 10);
        document.getElementById('progressFill').style.width = (pauseOffset / duration * 100) + '%';
        document.getElementById('currentTime').textContent = formatSecs(pauseOffset);
        highlightWord(pauseOffset);
      }
    });

    document.getElementById('skipFwdBtn').addEventListener('click', () => {
      if (!audioBuffer) return;
      const current = isPlaying ? (audioCtx.currentTime - startTime) + pauseOffset : pauseOffset;
      if (isPlaying) playFromOffset(current + 10);
      else {
        pauseOffset = Math.min(duration, current + 10);
        document.getElementById('progressFill').style.width = (pauseOffset / duration * 100) + '%';
        document.getElementById('currentTime').textContent = formatSecs(pauseOffset);
        highlightWord(pauseOffset);
      }
    });

    document.getElementById('progressBar').addEventListener('click', e => {
      if (!audioBuffer) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const seekTo = (e.clientX - rect.left) / rect.width * duration;
      if (isPlaying) playFromOffset(seekTo);
      else {
        pauseOffset = seekTo;
        document.getElementById('progressFill').style.width = (seekTo / duration * 100) + '%';
        document.getElementById('currentTime').textContent = formatSecs(seekTo);
        highlightWord(seekTo);
      }
    });

    // Chunking + TTS
    function chunkText(text, maxBytes = 4800) {
      const chunks = [];
      const sentences = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
      let current = '';
      for (const sentence of sentences) {
        const candidate = current ? current + ' ' + sentence.trim() : sentence.trim();
        if (new Blob([candidate]).size <= maxBytes) {
          current = candidate;
        } else {
          if (current) chunks.push(current.trim());
          if (new Blob([sentence]).size > maxBytes) {
            const words = sentence.trim().split(/\s+/);
            let wordChunk = '';
            for (const word of words) {
              const wc = wordChunk ? wordChunk + ' ' + word : word;
              if (new Blob([wc]).size <= maxBytes) { wordChunk = wc; }
              else { if (wordChunk) chunks.push(wordChunk); wordChunk = word; }
            }
            current = wordChunk;
          } else {
            current = sentence.trim();
          }
        }
      }
      if (current.trim()) chunks.push(current.trim());
      return chunks;
    }

    function base64ToArrayBuffer(b64) {
      const binaryStr = atob(b64);
      const bytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
      return bytes.buffer;
    }

    async function fetchTTSChunk(text, voiceName, langCode, apiKey) {
      const res = await fetch(`${TTS_ENDPOINT}?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: { text },
          voice: { languageCode: langCode, name: voiceName },
          audioConfig: { audioEncoding: 'MP3' },
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      return base64ToArrayBuffer(data.audioContent);
    }

    function concatAudioBuffers(ctx, buffers) {
      const totalLength = buffers.reduce((acc, b) => acc + b.length, 0);
      const channels = buffers[0].numberOfChannels;
      const output = ctx.createBuffer(channels, totalLength, buffers[0].sampleRate);
      let offset = 0;
      for (const buf of buffers) {
        for (let ch = 0; ch < channels; ch++) output.getChannelData(ch).set(buf.getChannelData(ch), offset);
        offset += buf.length;
      }
      return output;
    }

    // --- Render page ---
    function render() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      const notes = loadNotes();
      const note = notes.find(n => n.id === id);
      const content = document.getElementById('content');

      if (!note) {
        content.innerHTML = `<div class="not-found"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>Note not found.</p></div>`;
        return;
      }

      document.getElementById('navTitle').textContent = formatDate(note.createdAt);
      content.innerHTML = '';

      // Meta
      const meta = document.createElement('div');
      meta.className = 'note-meta';
      meta.textContent = formatDate(note.createdAt);
      content.appendChild(meta);

      // Text display
      const textDisplay = document.createElement('div');
      textDisplay.className = 'text-display';
      textDisplay.id = 'textDisplay';
      content.appendChild(textDisplay);
      renderTextDisplay(note.text);

      // Actions
      const actionsRow = document.createElement('div');
      actionsRow.className = 'actions-row';

      const copyBtn = makeBtn('Copy text',
        `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
        'btn-success', () => {
          navigator.clipboard.writeText(note.text).then(() => showToast('Copied'));
        });
      actionsRow.appendChild(copyBtn);

      const delBtn = makeBtn('Delete',
        `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
        'btn-danger', () => deleteNote(note.id));
      actionsRow.appendChild(delBtn);

      content.appendChild(actionsRow);

      // Wire speak button now that note is loaded
      document.getElementById('speakBtn').addEventListener('click', () => handleSpeak(note.text));
    }

    function makeBtn(label, iconHtml, extraClass, onClick) {
      const btn = document.createElement('button');
      btn.className = `btn${extraClass ? ' ' + extraClass : ''}`;
      btn.innerHTML = `${iconHtml} ${label}`;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function deleteNote(noteId) {
      if (!confirm('Delete this note?')) return;
      const notes = loadNotes().filter(n => n.id !== noteId);
      saveNotes(notes);
      stopAudio();
      window.location.href = '/voice-notes/reader';
    }

    const SPEAK_BTN_HTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Speak`;

    async function handleSpeak(text) {
      const apiKey = getApiKey();
      if (!apiKey) { showToast('No API key set'); return; }

      stopAudio();

      const speakBtn = document.getElementById('speakBtn');
      speakBtn.disabled = true;
      document.getElementById('loadingBar').classList.add('visible');

      const voiceName = document.getElementById('voiceSelect').value;
      const langCode = voiceName.substring(0, 5);

      try {
        const chunks = chunkText(text);
        speakBtn.textContent = chunks.length > 1 ? `Loading (0/${chunks.length})...` : 'Loading...';

        let completed = 0;
        const arrayBuffers = await Promise.all(chunks.map(async chunk => {
          const buf = await fetchTTSChunk(chunk, voiceName, langCode, apiKey);
          completed++;
          if (chunks.length > 1) speakBtn.textContent = `Loading (${completed}/${chunks.length})...`;
          return buf;
        }));

        audioCtx = new AudioContext();
        const decodedBuffers = await Promise.all(arrayBuffers.map(ab => audioCtx.decodeAudioData(ab)));
        audioBuffer = decodedBuffers.length === 1 ? decodedBuffers[0] : concatAudioBuffers(audioCtx, decodedBuffers);
        duration = audioBuffer.duration;

        wordTimings = buildWordTimings(text, duration);

        document.getElementById('totalTime').textContent = formatSecs(duration);
        document.getElementById('transport').classList.add('visible');
        playFromOffset(0);

      } catch (e) {
        showToast(`Error: ${e.message}`, 4000);
      } finally {
        speakBtn.disabled = false;
        speakBtn.innerHTML = SPEAK_BTN_HTML;
        document.getElementById('loadingBar').classList.remove('visible');
      }
    }

    // Init
    if (!getApiKey()) {
      localStorage.setItem(API_KEY_STORAGE, 'AIzaSyCOBDj6tZblWaiJeYzQ0SfaMECbkRjeHd4');
    }

    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/voice-notes/sw.js', { scope: '/voice-notes/' });
    }
  </script>
</body>
</html>
