<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Voice Note</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent-light: #a855f7;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .back-btn:hover { color: var(--text); background: var(--border); }

    .navbar-title {
      font-size: 1rem;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .navbar-actions { display: flex; gap: 6px; margin-left: auto; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: color 0.2s, background 0.2s;
    }

    .icon-btn:hover { color: var(--text); background: var(--border); }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }

    .note-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.72rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .save-indicator {
      font-size: 0.7rem;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-indicator.show { opacity: 1; }

    /* Editable transcript */
    .transcript-body {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
      outline: none;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 12px;
      transition: border-color 0.2s, background 0.2s;
      min-height: 60px;
    }

    .transcript-body:focus {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .transcript-body:hover:not(:focus) {
      border-color: var(--border);
    }

    .edit-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 6px;
      opacity: 0.7;
    }

    .transcript-pending { font-size: 0.88rem; color: var(--text-muted); font-style: italic; }
    .transcript-error { font-size: 0.85rem; color: var(--warning); word-break: break-word; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Actions */
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 9px;
      border: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: none;
      color: var(--text-muted);
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }

    .btn:hover { color: var(--text); background: var(--border); border-color: rgba(255,255,255,0.15); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-success:hover { color: var(--success); background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }
    .btn-danger:hover  { color: var(--danger);  background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.3); }
    .btn-warn:hover    { color: var(--warning);  background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    .not-found {
      text-align: center;
      padding: 60px 16px;
      color: var(--text-muted);
    }

    .not-found p { font-size: 0.9rem; margin-top: 10px; }
  </style>
  <script src="/sw-toast.js" defer></script>
</head>
<body>

  <nav class="navbar">
    <a href="/voice-notes/" class="back-btn" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <div class="navbar-title" id="navTitle">Voice Note</div>
    <div class="navbar-actions" id="navActions"></div>
  </nav>

  <div class="toast" id="toast"></div>
  <div class="container" id="content"></div>

  <script type="module">
    import { getNote, putNote, deleteNote, getAudioBlob, deleteAudioBlob } from './db.js';
    import { updateNote as remoteUpdateNote, removeNote as remoteRemoveNote } from './api.js';

    const MODEL = 'voxtral-mini-latest';
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/audio/transcriptions';

    const SVG = {
      copy:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
      refresh: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`,
      trash:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
      mic:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`,
    };

    function isAdmin() { return !!sessionStorage.getItem('vn-auth-token'); }
    function getApiKey() { return localStorage.getItem('voice-notes-mistral-key') || ''; }

    function showToast(msg, duration = 2200) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._tid);
      t._tid = setTimeout(() => t.classList.remove('show'), duration);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (d.toDateString() === now.toDateString()) return `Today at ${time}`;
      if (d.toDateString() === yesterday.toDateString()) return `Yesterday at ${time}`;
      return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) + ' at ' + time;
    }

    function formatDuration(secs) {
      if (!secs) return null;
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function makeBtn(label, iconHtml, extraClass, onClick) {
      const btn = document.createElement('button');
      btn.className = `btn${extraClass ? ' ' + extraClass : ''}`;
      btn.innerHTML = `${iconHtml} ${label}`;
      btn.addEventListener('click', onClick);
      return btn;
    }

    async function transcribeBlob(blob, mimeType) {
      const key = getApiKey();
      if (!key) return null;
      const ext = mimeType.includes('webm') ? 'webm' : mimeType.includes('ogg') ? 'ogg' : 'webm';
      const fd = new FormData();
      fd.append('file', blob, `rec.${ext}`);
      fd.append('model', MODEL);
      const res = await fetch(MISTRAL_ENDPOINT, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}` },
        body: fd,
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data.text || null;
    }

    async function render() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      const note = await getNote(id);
      const content = document.getElementById('content');

      if (!note) {
        content.innerHTML = `<div class="not-found"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>Note not found.</p></div>`;
        return;
      }

      document.getElementById('navTitle').textContent = formatDate(note.createdAt);

      // Meta row
      const meta = document.createElement('div');
      meta.className = 'note-meta';
      meta.textContent = formatDate(note.createdAt);
      const dur = formatDuration(note.duration);
      if (dur) {
        const pill = document.createElement('span');
        pill.className = 'meta-pill';
        pill.textContent = dur;
        meta.appendChild(pill);
      }
      if (note.isRemote) {
        const pill = document.createElement('span');
        pill.className = 'meta-pill';
        pill.textContent = 'Remote';
        meta.appendChild(pill);
      }
      content.appendChild(meta);

      // Transcript section
      const tsLabel = document.createElement('div');
      tsLabel.className = 'section-label';

      const saveIndicator = document.createElement('span');
      saveIndicator.className = 'save-indicator';
      saveIndicator.textContent = 'Saved';

      const tsWrap = document.createElement('div');

      if (note.transcriptStatus === 'transcribing') {
        tsLabel.innerHTML = '<div class="spinner"></div> Transcribing...';
        tsWrap.appendChild(tsLabel);
        tsWrap.appendChild(Object.assign(document.createElement('div'), { className: 'transcript-pending', textContent: 'Processing your voice note...' }));
      } else if (note.transcriptStatus === 'done' && note.transcript) {
        tsLabel.innerHTML = 'Transcript';
        tsLabel.appendChild(saveIndicator);

        const body = document.createElement('div');
        body.className = 'transcript-body';
        body.contentEditable = 'true';
        body.setAttribute('role', 'textbox');
        body.setAttribute('aria-multiline', 'true');
        body.setAttribute('aria-label', 'Transcript text, editable');
        body.textContent = note.transcript;
        body.spellcheck = true;

        const hint = document.createElement('div');
        hint.className = 'edit-hint';
        hint.textContent = 'Tap to edit transcript';

        let saveTimeout = null;
        body.addEventListener('input', () => {
          clearTimeout(saveTimeout);
          saveTimeout = setTimeout(async () => {
            note.transcript = body.textContent.trim();
            await putNote(note);
            if (isAdmin()) {
              try { await remoteUpdateNote(note.id, { transcript: note.transcript }); } catch {}
            }
            saveIndicator.classList.add('show');
            setTimeout(() => saveIndicator.classList.remove('show'), 1800);
          }, 800);
        });

        body.addEventListener('focus', () => { hint.style.display = 'none'; });
        body.addEventListener('blur', () => { hint.style.display = ''; });

        tsWrap.appendChild(tsLabel);
        tsWrap.appendChild(body);
        tsWrap.appendChild(hint);
      } else if (note.transcriptStatus === 'error') {
        tsLabel.textContent = 'Transcript';
        tsWrap.appendChild(tsLabel);
        tsWrap.appendChild(Object.assign(document.createElement('div'), { className: 'transcript-error', textContent: `Transcription failed: ${note.transcriptError || 'Unknown error'}` }));
      } else {
        tsLabel.textContent = 'Transcript';
        tsWrap.appendChild(tsLabel);
        tsWrap.appendChild(Object.assign(document.createElement('div'), { className: 'transcript-pending', textContent: 'No transcript available.' }));
      }

      content.appendChild(tsWrap);

      // Actions row
      const actionsRow = document.createElement('div');
      actionsRow.className = 'actions-row';

      if (note.transcript) {
        actionsRow.appendChild(makeBtn('Copy text', SVG.copy, 'btn-success', () => {
          navigator.clipboard.writeText(note.transcript).then(() => showToast('Copied'));
        }));
      }

      // Retranscribe button — only if audio exists
      const stored = await getAudioBlob(note.id);
      if (stored && getApiKey()) {
        const reBtn = makeBtn('Retranscribe', SVG.refresh, '', async () => {
          reBtn.disabled = true;
          reBtn.textContent = 'Transcribing...';
          try {
            const blob = stored.blob instanceof Blob ? stored.blob : new Blob([stored.blob], { type: stored.mimeType });
            const text = await transcribeBlob(blob, stored.mimeType);
            if (!text) throw new Error('No text returned');
            note.transcript = text;
            note.transcriptStatus = 'done';
            note.transcriptError = null;
            await putNote(note);
            if (isAdmin()) {
              try { await remoteUpdateNote(note.id, { transcript: text, transcript_status: 'done', transcript_error: null }); } catch {}
            }
            showToast('Retranscribed');
            render(); // re-render with new text
          } catch (e) {
            showToast('Failed: ' + e.message);
            reBtn.disabled = false;
            reBtn.innerHTML = `${SVG.refresh} Retranscribe`;
          }
        });
        actionsRow.appendChild(reBtn);

        // Delete audio only (keep text)
        if (note.transcript) {
          actionsRow.appendChild(makeBtn('Delete audio', SVG.mic, 'btn-warn', async () => {
            if (!confirm('Delete the audio recording? The transcript text will be kept.')) return;
            await deleteAudioBlob(note.id);
            showToast('Audio deleted');
            render();
          }));
        }
      }

      // Delete note entirely
      actionsRow.appendChild(makeBtn('Delete note', SVG.trash, 'btn-danger', async () => {
        if (!confirm('Delete this note permanently?')) return;
        await deleteNote(note.id);
        await deleteAudioBlob(note.id);
        if (isAdmin()) { try { await remoteRemoveNote(note.id); } catch {} }
        window.location.href = '/voice-notes/';
      }));

      content.appendChild(actionsRow);
    }

    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/voice-notes/sw.js', { scope: '/voice-notes/' });
    }
  </script>
</body>
</html>
