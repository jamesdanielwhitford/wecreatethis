<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#333">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>New Bingo Game - Birdle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="bingo-games" class="back-btn">&larr; Back</a>
  <h1>New Bingo Game</h1>

  <!-- Title -->
  <div class="form-group">
    <label for="game-title">Game Title</label>
    <input type="text" id="game-title" placeholder="">
    <p class="hint" id="default-title-hint">Leave blank to use today's date</p>
  </div>

  <!-- Region Selector -->
  <div class="form-group">
    <label>Choose Your Location</label>
    <div class="location-mode-toggle">
      <button class="location-mode-btn active" data-mode="region">🗺️ Region</button>
      <button class="location-mode-btn" data-mode="precise">📍 Precise</button>
    </div>
    <div id="location-region-panel">
      <div class="region-selects">
        <select id="country-select">
          <option value="">Select Country...</option>
        </select>
        <select id="state-select" disabled>
          <option value="">Select State/Province...</option>
        </select>
      </div>
    </div>
    <div id="location-precise-panel" style="display:none;">
      <button id="use-location-btn" class="location-btn">📍 Use My Precise Location</button>
      <p class="hint" style="margin-top: 8px; text-align: center; font-size: 13px; font-weight: 600; color: #666;">For a more accurate bird list</p>
    </div>
    <p id="region-info" class="hint" style="text-align: center; margin-top: 12px;"></p>
  </div>

  <!-- Difficulty Selector -->
  <div class="form-group">
    <label>Difficulty</label>
    <div class="difficulty-selector">
      <button class="difficulty-btn active" data-difficulty="easy">
        <span class="difficulty-emoji">🟢</span>
        <span class="difficulty-name">Easy</span>
        <span class="difficulty-desc">Most common birds</span>
      </button>
      <button class="difficulty-btn" data-difficulty="medium">
        <span class="difficulty-emoji">🟡</span>
        <span class="difficulty-name">Medium</span>
        <span class="difficulty-desc">Less common birds</span>
      </button>
      <button class="difficulty-btn" data-difficulty="hard">
        <span class="difficulty-emoji">🔴</span>
        <span class="difficulty-name">Hard</span>
        <span class="difficulty-desc">Harder to spot birds</span>
      </button>
    </div>
  </div>

  <!-- Create Button -->
  <button id="create-game-btn" class="btn create-btn" disabled>Create Game</button>

  <!-- Loading indicator -->
  <div id="creating-spinner" class="loading" style="display:none;">
    <p>Creating bingo game...</p>
  </div>

  <script src="location.js"></script>
  <script src="ebird.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
  <script>
    // Set default title placeholder
    (function() {
      const titleInput = document.getElementById('game-title');
      const defaultTitleHint = document.getElementById('default-title-hint');
      const defaultTitle = new Date().toLocaleDateString();

      if (titleInput && defaultTitleHint) {
        titleInput.placeholder = defaultTitle;
        defaultTitleHint.textContent = `Leave blank for "${defaultTitle}"`;
      }
    })();

    // Difficulty selector
    (function() {
      const buttons = document.querySelectorAll('.difficulty-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    })();

    // Location mode toggle
    (function() {
      const modeBtns = document.querySelectorAll('.location-mode-btn');
      const regionPanel = document.getElementById('location-region-panel');
      const precisePanel = document.getElementById('location-precise-panel');
      modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          modeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const mode = btn.dataset.mode;
          regionPanel.style.display = mode === 'region' ? 'block' : 'none';
          precisePanel.style.display = mode === 'precise' ? 'block' : 'none';
        });
      });
    })();
  </script>
</body>
</html>
