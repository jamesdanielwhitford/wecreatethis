<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#4a9fd4"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#sky)"/>
  <!-- Bird silhouette (simple, recognisable) -->
  <!-- Body -->
  <ellipse cx="50" cy="52" rx="16" ry="10" fill="#1a3a1a"/>
  <!-- Head -->
  <circle cx="66" cy="46" r="9" fill="#1a3a1a"/>
  <!-- Beak -->
  <polygon points="75,44 84,46 75,49" fill="#f5a623"/>
  <!-- Eye -->
  <circle cx="69" cy="45" r="2" fill="#fff"/>
  <circle cx="70" cy="45" r="1" fill="#1a3a1a"/>
  <!-- Tail feathers -->
  <polygon points="34,52 22,44 26,54 20,58 36,56" fill="#1a3a1a"/>
  <!-- Wing -->
  <ellipse cx="50" cy="50" rx="14" ry="6" fill="#2d5a2d" transform="rotate(-10 50 50)"/>
  <!-- Branch -->
  <line x1="20" y1="68" x2="80" y2="68" stroke="#7a5c2e" stroke-width="5" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="48" y1="62" x2="44" y2="68" stroke="#1a3a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="62" x2="48" y2="68" stroke="#1a3a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="62" x2="56" y2="68" stroke="#1a3a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="62" x2="52" y2="68" stroke="#1a3a1a" stroke-width="2" stroke-linecap="round"/>
</svg>
