<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bird Image Fetch Test</title>
  <style>
    body { font-family: monospace; padding: 16px; background: #111; color: #eee; }
    h1 { color: #4caf50; font-size: 18px; margin: 0 0 12px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr; } }
    .col h2 { color: #aaa; font-size: 14px; margin: 0 0 12px; border-bottom: 1px solid #333; padding-bottom: 6px; }
    .result { margin: 0 0 16px; padding: 12px; background: #222; border-radius: 8px; }
    .result img { max-width: 100%; display: block; margin-top: 8px; border-radius: 4px; }
    .label { color: #888; font-size: 11px; margin-top: 6px; }
    .url { word-break: break-all; color: #adf; font-size: 11px; margin: 2px 0; }
    .status { font-weight: bold; font-size: 12px; margin-top: 4px; }
    .ok { color: #4caf50; }
    .fail { color: #f44336; }
    button { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
    button:hover { background: #388e3c; }
    #log { white-space: pre-wrap; font-size: 12px; color: #ccc; background: #1a1a1a; padding: 12px; border-radius: 6px; margin-top: 20px; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>Bird Image Fix Test</h1>
  <button onclick="runTest()">Run Test</button>
  <div id="log"></div>
  <div class="grid">
    <div class="col">
      <h2>OLD: always use thumbnail URL</h2>
      <div id="old-results"></div>
    </div>
    <div class="col">
      <h2>NEW: use original URL if non-standard width</h2>
      <div id="new-results"></div>
    </div>
  </div>

  <script>
    const TESTS = [
      { comName: 'Black Crake', sciName: 'Zapornia flavirostra' },
      { comName: 'Yellow-crowned Bishop', sciName: 'Euplectes afer' },
      { comName: 'Long-billed Crombec', sciName: 'Sylvietta rufescens' },
      { comName: 'African Spoonbill', sciName: 'Platalea alba' }, // control: known 500px
    ];

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    async function fetchWikipediaImage(searchTerm) {
      const variants = [searchTerm, searchTerm.replace(/-/g, ' ')].filter((v, i, a) => a.indexOf(v) === i);
      for (const variant of variants) {
        const title = encodeURIComponent(variant.replace(/ /g, '_'));
        const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${title}&prop=pageimages&pithumbsize=400&format=json&origin=*&redirects=1`;
        try {
          const res = await fetch(url);
          const data = await res.json();
          const page = Object.values(data.query?.pages || {})[0];
          if (page?.thumbnail?.source) return page.thumbnail.source;
        } catch (e) {}
      }
      return null;
    }

    function toOriginalUrl(thumbUrl) {
      return thumbUrl.replace(/\/thumb\//, '/').replace(/\/\d+px-[^/]+$/, '');
    }

    function isNonStandard(url) {
      return !url.match(/\/500px-/);
    }

    function testImg(url, div, label, birdName) {
      div.innerHTML += `<div class="label">${label}:</div>`;
      div.innerHTML += `<div class="url">${decodeURIComponent(url)}</div>`;
      const img = document.createElement('img');
      const statusId = `s-${Math.random().toString(36).slice(2)}`;
      div.innerHTML += `<div class="status" id="${statusId}">Loading...</div>`;
      img.src = url;
      img.onload = () => { log(`  ✓ [${label}] ${birdName} loaded`); document.getElementById(statusId).className = 'status ok'; document.getElementById(statusId).textContent = '✓ Loaded'; div.appendChild(img); };
      img.onerror = () => { log(`  ✗ [${label}] ${birdName} FAILED`); document.getElementById(statusId).className = 'status fail'; document.getElementById(statusId).textContent = '✗ Failed (429 or error)'; };
    }

    async function runTest() {
      document.getElementById('old-results').innerHTML = '';
      document.getElementById('new-results').innerHTML = '';
      document.getElementById('log').textContent = '';
      log('Starting tests...\n');

      for (const bird of TESTS) {
        const oldDiv = document.createElement('div');
        oldDiv.className = 'result';
        oldDiv.innerHTML = `<strong>${bird.comName}</strong>`;
        document.getElementById('old-results').appendChild(oldDiv);

        const newDiv = document.createElement('div');
        newDiv.className = 'result';
        newDiv.innerHTML = `<strong>${bird.comName}</strong>`;
        document.getElementById('new-results').appendChild(newDiv);

        log(`--- ${bird.comName} ---`);
        let imageUrl = await fetchWikipediaImage(bird.comName);
        if (!imageUrl) {
          log(`  No image from common name, trying scientific name`);
          imageUrl = await fetchWikipediaImage(bird.sciName);
        }

        if (!imageUrl) {
          oldDiv.innerHTML += `<div class="status fail">✗ No image URL found</div>`;
          newDiv.innerHTML += `<div class="status fail">✗ No image URL found</div>`;
          continue;
        }

        const nonStandard = isNonStandard(imageUrl);
        const width = imageUrl.match(/\/(\d+px-)/)?.[1] || '?';
        log(`  URL: ${decodeURIComponent(imageUrl)}`);
        log(`  Width: ${width} — ${nonStandard ? 'NON-STANDARD' : 'standard'}`);
        if (nonStandard) log(`  Original: ${toOriginalUrl(imageUrl)}`);
        oldDiv.innerHTML += `<div class="label">Width: ${width} ${nonStandard ? '⚠️ non-standard' : '✓ standard'}</div>`;
        newDiv.innerHTML += `<div class="label">Width: ${width} ${nonStandard ? '⚠️ non-standard → using original' : '✓ standard → using thumbnail'}</div>`;

        // OLD: always use thumbnail
        testImg(imageUrl, oldDiv, 'Thumbnail URL', bird.comName);

        // NEW: use original if non-standard width
        const finalUrl = nonStandard ? toOriginalUrl(imageUrl) : imageUrl;
        testImg(finalUrl, newDiv, nonStandard ? 'Original URL' : 'Thumbnail URL', bird.comName);
      }
    }
  </script>
</body>
</html>
