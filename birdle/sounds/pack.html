<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#333">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Build Sound Set - Birdle</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../icon-192.png">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Checkmark overlay on bird items */
    .bird-item { position: relative; cursor: pointer; }
    .bird-item a { pointer-events: none; }
    .bird-item.selected { background: #e8f5e9; }
    .bird-select-check {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #ccc;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: transparent;
      flex-shrink: 0;
      pointer-events: none;
    }
    .bird-item.selected .bird-select-check {
      background: #4caf50;
      border-color: #4caf50;
      color: white;
    }
    /* Floating CTA */
    .pack-cta {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .pack-cta button {
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      background: #333;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      white-space: nowrap;
    }
    .pack-cta button:disabled {
      background: #aaa;
      box-shadow: none;
      cursor: default;
    }
    #bird-list { padding-bottom: 100px; }
  </style>
</head>
<body>
  <nav class="game-navbar search-navbar">
    <a href="index" class="back-btn">&larr; Back</a>
    <h1 style="font-size: 18px; margin: 0; position: absolute; left: 50%; transform: translateX(-50%);">Build Sound Set</h1>
  </nav>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" id="bird-search" placeholder="Search birds...">
  </div>

  <!-- Location Button -->
  <button id="current-location-btn" class="current-location-btn">
    <span id="current-location-text">Select Location</span>
  </button>

  <!-- Sort & Filter Controls -->
  <div class="filter-row">
    <select id="sort-type">
      <option value="most-likely">Sort: Most Likely</option>
      <option value="alphabetical">Sort: A-Z</option>
      <option value="recent">Recently Viewed</option>
    </select>
    <select id="seen-filter">
      <option value="all">Show All</option>
      <option value="hide">Hide Seen</option>
      <option value="only">Only Seen</option>
    </select>
  </div>

  <!-- Location Modal -->
  <div id="location-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2>Update Search Location</h2>
      <div class="location-option">
        <h3>Select Region</h3>
        <div class="filter-row region-filters">
          <select id="modal-country-filter">
            <option value="">Select country...</option>
          </select>
          <select id="modal-state-filter" disabled>
            <option value="">State/Province...</option>
          </select>
        </div>
        <button id="apply-region-btn" class="btn-primary" disabled>Apply Region</button>
      </div>
      <div class="location-option">
        <h3>Use Current Location</h3>
        <p class="hint">Use your precise GPS coordinates for hyper-local results</p>
        <button id="use-gps-btn" class="btn-primary">📍 Use My Location</button>
        <p id="gps-status" class="hint" style="display:none; margin-top: 8px;"></p>
      </div>
      <div class="location-option">
        <h3>Pick on Map</h3>
        <button id="modal-pick-map-btn" class="btn-primary">📍 Pick Location on Map</button>
      </div>
      <button id="location-modal-close" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <!-- Map Picker -->
  <div id="map-container" style="display:none;">
    <div id="map"></div>
    <div class="map-actions">
      <button id="map-cancel-btn">Cancel</button>
      <button id="map-confirm-btn">Search here</button>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading" class="loading" style="display:none;">Loading birds...</div>

  <!-- Bird List -->
  <ul id="bird-list" class="bird-list"></ul>

  <!-- Floating CTA -->
  <div class="pack-cta">
    <button id="pack-start-btn" disabled>Select birds to start</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../location.js"></script>
  <script src="../db.js"></script>
  <script src="../ebird.js"></script>
  <script src="../app.js"></script>
  <script src="pack.js"></script>
  <script>
    (async function () {
      await BirdDB.init();
      PackApp.init();
    })();
  </script>
</body>
</html>
