<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#333">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Bird Sounds - Birdle</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../icon-192.png">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .sounds-list {
      list-style: none;
      margin-top: 8px;
      padding-bottom: 32px;
    }
    .sound-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    .sound-thumb {
      width: 64px;
      min-width: 64px;
      height: 64px;
      border-radius: 10px;
      overflow: hidden;
      background: #f0f0f0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sound-thumb.loading {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .sound-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .sound-info {
      flex: 1;
      min-width: 0;
    }
    .sound-name {
      font-weight: 500;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sound-sci {
      font-size: 12px;
      color: #888;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sound-count {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }
    .play-sound-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #38592D;
      background: transparent;
      color: #333;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .play-sound-btn:active,
    .play-sound-btn.playing {
      background: #38592D;
      color: #fff;
    }
    .play-sound-btn.loading-audio {
      opacity: 0.5;
      cursor: default;
    }
    .location-label {
      font-size: 13px;
      color: #999;
      padding: 8px 0 4px;
    }
    #empty-msg {
      padding: 40px 0;
      text-align: center;
      color: #999;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <nav class="game-navbar search-navbar">
    <a href="index" class="back-btn">&larr; Back</a>
    <span id="pack-title" style="font-weight: bold; font-size: 16px; position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%;">Bird Sounds</span>
  </nav>

  <p id="location-label" class="location-label"></p>

  <div id="empty-msg" style="display: none;">Pack not found. <a href="index">Go back</a>.</div>

  <ul id="sounds-list" class="sounds-list"></ul>

  <script src="../db.js"></script>
  <script src="../app.js"></script>
  <script src="pack-view.js"></script>
  <script>
    (async function () {
      await BirdDB.init();
      PackViewApp.init();
    })();
  </script>
</body>
</html>
