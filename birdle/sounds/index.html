<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#333">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Bird Sounds - Birdle</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../icon-192.png">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .packs-list {
      list-style: none;
      margin-top: 8px;
    }
    .pack-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }
    .pack-main {
      flex: 1;
      min-width: 0;
      cursor: pointer;
      text-decoration: none;
      color: #333;
    }
    .pack-name {
      font-weight: 500;
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pack-meta {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .pack-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .icon-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      color: #666;
    }
    .icon-btn:active { background: #f0f0f0; }
    .icon-btn.danger { color: #c00; border-color: #fcc; }
    .new-pack-btn {
      width: 100%;
      margin-top: 16px;
      font-size: 16px;
      padding: 14px;
    }
    .empty-state {
      padding: 48px 0;
      text-align: center;
      color: #999;
    }
    .empty-state p { margin-bottom: 16px; }

    /* Rename modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: calc(100% - 40px);
      max-width: 360px;
    }
    .modal-box h3 { margin: 0 0 16px; font-size: 16px; }
    .modal-box input {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 14px;
    }
    .modal-box input:focus { outline: none; border-color: #333; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .modal-btns .cancel-btn { background: none; border: 1px solid #ccc; color: #666; }
    .modal-btns .save-btn { background: #333; color: #fff; border: none; }
  </style>
</head>
<body>
  <nav class="game-navbar search-navbar">
    <a href="../index" class="back-btn">&larr; Home</a>
    <span style="font-weight: bold; font-size: 16px; position: absolute; left: 50%; transform: translateX(-50%);">Bird Sounds</span>
  </nav>

  <ul id="packs-list" class="packs-list"></ul>
  <div id="empty-state" class="empty-state" style="display: none;">
    <p>No sound packs yet.</p>
  </div>

  <a href="pack" class="btn new-pack-btn" style="display: block; text-align: center; text-decoration: none; box-sizing: border-box;">+ New Sound Pack</a>

  <!-- Rename modal -->
  <div id="rename-modal" class="modal">
    <div class="modal-box">
      <h3>Rename Pack</h3>
      <input type="text" id="rename-input" placeholder="Pack name" maxlength="60">
      <div class="modal-btns">
        <button class="cancel-btn" id="rename-cancel">Cancel</button>
        <button class="save-btn" id="rename-save">Save</button>
      </div>
    </div>
  </div>

  <script src="../db.js"></script>
  <script src="../app.js"></script>
  <script src="index.js"></script>
  <script>
    (async function () {
      await BirdDB.init();
      SoundsIndex.init();
    })();
  </script>
</body>
</html>
