<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Note — Inkwell</title>
  <link rel="manifest" href="/inkwell/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      background: Canvas;
      color: CanvasText;
      min-height: 100dvh;
    }

    header {
      padding: 1rem 1.25rem 0.5rem;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
    }

    nav.breadcrumb { font-size: 0.85rem; color: color-mix(in srgb, CanvasText 55%, transparent); }
    nav.breadcrumb a { color: inherit; text-decoration: none; }
    nav.breadcrumb a:hover { text-decoration: underline; }
    nav.breadcrumb span + span::before { content: " / "; }

    .page { padding: 1.5rem 1.25rem; max-width: 560px; }

    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; }

    .record-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    #btn-record {
      font: inherit;
      font-size: 1rem;
      padding: 0.75rem 2rem;
      border: 1px solid CanvasText;
      border-radius: 6px;
      background: Canvas;
      color: CanvasText;
      cursor: pointer;
      min-height: 48px;
      touch-action: manipulation;
    }

    #btn-record:hover { background: color-mix(in srgb, CanvasText 6%, transparent); }
    #btn-record.recording { border-color: red; color: red; }

    #timer {
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      color: color-mix(in srgb, CanvasText 55%, transparent);
      min-height: 1.4em;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: color-mix(in srgb, CanvasText 50%, transparent);
      margin-bottom: 0.5rem;
    }

    #transcript-area {
      width: 100%;
      font: inherit;
      font-size: 1rem;
      line-height: 1.6;
      padding: 0.75rem;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 4px;
      background: Field;
      color: FieldText;
      resize: vertical;
      min-height: 120px;
      margin-bottom: 1rem;
    }

    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    .btn {
      font: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 1.25rem;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 4px;
      background: Canvas;
      color: CanvasText;
      cursor: pointer;
      min-height: 44px;
      touch-action: manipulation;
    }

    .btn:hover { background: color-mix(in srgb, CanvasText 6%, transparent); }
    .btn-primary { border-color: CanvasText; font-weight: 600; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    #status-msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: color-mix(in srgb, CanvasText 55%, transparent);
      min-height: 1.4em;
    }

    #review-section { display: none; }
    #review-section.visible { display: block; }
  </style>
  <script src="/sw-toast.js" defer></script>
</head>
<body>

<header>
  <nav class="breadcrumb" id="breadcrumb" aria-label="Location">
    <span><a href="/inkwell/">Inkwell</a></span>
    <span>Voice note</span>
  </nav>
</header>

<div class="page">
  <h1>Voice note</h1>

  <div class="record-area">
    <button id="btn-record" type="button">Record</button>
    <span id="timer"></span>
  </div>

  <div id="review-section">
    <p class="section-label">Transcription — edit before saving</p>
    <textarea id="transcript-area" rows="6" spellcheck="true"></textarea>
    <div class="actions">
      <button class="btn btn-primary" id="btn-save" type="button">Save as note</button>
      <button class="btn" id="btn-retake" type="button">Retake</button>
    </div>
  </div>

  <p id="status-msg"></p>
</div>

<script type="module" src="/inkwell/voice.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/inkwell/sw.js');</script>
</body>
</html>
