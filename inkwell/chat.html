<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Chat — Inkwell</title>
  <link rel="manifest" href="/inkwell/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      background: Canvas;
      color: CanvasText;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.25rem 0.5rem;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      flex-shrink: 0;
    }

    nav.breadcrumb { font-size: 0.85rem; color: color-mix(in srgb, CanvasText 55%, transparent); }
    nav.breadcrumb a { color: inherit; text-decoration: none; }
    nav.breadcrumb a:hover { text-decoration: underline; }
    nav.breadcrumb span + span::before { content: " / "; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg {
      max-width: 80%;
      padding: 0.6rem 0.85rem;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: color-mix(in srgb, CanvasText 12%, transparent);
    }

    .msg.assistant {
      align-self: flex-start;
      background: color-mix(in srgb, CanvasText 5%, transparent);
    }

    #chat-input-area {
      border-top: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      padding: 0.75rem 1.25rem;
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      font: inherit;
      font-size: 0.95rem;
      padding: 0.5rem 0.65rem;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 4px;
      background: Field;
      color: FieldText;
      resize: none;
      max-height: 120px;
      min-height: 40px;
    }

    #chat-input:focus { outline: 2px solid color-mix(in srgb, CanvasText 40%, transparent); outline-offset: 1px; }

    .btn {
      font: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 0.85rem;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 4px;
      background: Canvas;
      color: CanvasText;
      cursor: pointer;
      min-height: 40px;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .btn:hover { background: color-mix(in srgb, CanvasText 6%, transparent); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { border-color: CanvasText; font-weight: 600; }

    #generate-bar {
      border-top: 1px solid color-mix(in srgb, CanvasText 10%, transparent);
      padding: 0.6rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    #status-msg {
      font-size: 0.8rem;
      color: color-mix(in srgb, CanvasText 50%, transparent);
    }

    #preview-panel {
      border-top: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      padding: 1rem 1.25rem;
      flex-shrink: 0;
      display: none;
    }

    #preview-panel.visible { display: block; }

    #preview-panel h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: color-mix(in srgb, CanvasText 50%, transparent);
      margin-bottom: 0.5rem;
    }

    #preview-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    #preview-body {
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      color: color-mix(in srgb, CanvasText 80%, transparent);
      margin-bottom: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .preview-actions { display: flex; gap: 0.5rem; }
  </style>
  <script src="/sw-toast.js" defer></script>
</head>
<body>

<header>
  <nav class="breadcrumb" id="breadcrumb" aria-label="Location">
    <span><a href="/inkwell/">Inkwell</a></span>
    <span>AI chat</span>
  </nav>
</header>

<div id="chat-messages" role="log" aria-live="polite"></div>

<div id="generate-bar">
  <button class="btn btn-primary" id="btn-generate" type="button">Generate note</button>
  <div id="ai-mode-toggle" style="display:flex;border:1px solid color-mix(in srgb, CanvasText 25%, transparent);border-radius:4px;overflow:hidden;font-size:0.8rem;">
    <button id="ai-mode-fast" class="btn" style="border:none;border-radius:0;padding:0.2rem 0.6rem;min-height:unset;font-size:0.8rem;" type="button">Fast</button>
    <button id="ai-mode-smart" class="btn" style="border:none;border-radius:0;padding:0.2rem 0.6rem;min-height:unset;font-size:0.8rem;" type="button">Smart</button>
  </div>
  <span id="status-msg"></span>
</div>

<div id="preview-panel">
  <h2>Preview</h2>
  <div id="preview-title"></div>
  <div id="preview-body"></div>
  <div class="preview-actions">
    <button class="btn btn-primary" id="btn-accept" type="button">Save note</button>
    <button class="btn" id="btn-reject" type="button">Keep chatting</button>
  </div>
</div>

<div id="chat-input-area">
  <textarea id="chat-input" rows="1" placeholder="Type a message..." aria-label="Message"></textarea>
  <button class="btn btn-primary" id="btn-send" type="button">Send</button>
</div>

<script type="module" src="/inkwell/chat.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/inkwell/sw.js');</script>
</body>
</html>
