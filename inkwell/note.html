<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inkwell</title>
  <link rel="manifest" href="/inkwell/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      background: Canvas;
      color: CanvasText;
      min-height: 100dvh;
    }

    header {
      padding: 1rem 1.25rem 0.5rem;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
    }

    nav.breadcrumb {
      font-size: 0.85rem;
      color: color-mix(in srgb, CanvasText 55%, transparent);
    }

    nav.breadcrumb a { color: inherit; text-decoration: none; }
    nav.breadcrumb a:hover { text-decoration: underline; }
    nav.breadcrumb span + span::before { content: " / "; }

    .note-container {
      padding: 1.5rem 1.25rem;
      max-width: 680px;
    }

    .note-title {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 1.25rem;
    }

    .note-body {
      font-size: 1rem;
      line-height: 1.65;
      white-space: pre-wrap;
      color: color-mix(in srgb, CanvasText 85%, transparent);
    }
  </style>
</head>
<body>

<header>
  <nav class="breadcrumb" id="breadcrumb" aria-label="Location"></nav>
</header>

<div class="note-container">
  <h1 class="note-title" id="note-title"></h1>
  <div class="note-body" id="note-body"></div>
</div>

<script type="module" src="/inkwell/note.js"></script>
</body>
</html>
