<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inkwell</title>
  <link rel="manifest" href="/inkwell/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      background: Canvas;
      color: CanvasText;
      min-height: 100dvh;
    }

    header {
      padding: 1rem 1.25rem 0.5rem;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
    }

    nav.breadcrumb {
      font-size: 0.85rem;
      color: color-mix(in srgb, CanvasText 55%, transparent);
    }

    nav.breadcrumb a { color: inherit; text-decoration: none; }
    nav.breadcrumb a:hover { text-decoration: underline; }
    nav.breadcrumb span + span::before { content: " / "; }

    .note-container {
      padding: 1.5rem 1.25rem;
      max-width: 680px;
    }

    .note-title {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 1.25rem;
    }

    .note-body {
      font-size: 1rem;
      line-height: 1.65;
      white-space: pre-wrap;
      color: color-mix(in srgb, CanvasText 85%, transparent);
    }

    [contenteditable] {
      outline: none;
      border: none;
      background: transparent;
      cursor: text;
      display: block;
    }

    [contenteditable]:focus {
      background: color-mix(in srgb, CanvasText 3%, transparent);
      border-radius: 3px;
    }

    [contenteditable]:empty::before {
      content: attr(data-placeholder);
      color: color-mix(in srgb, CanvasText 30%, transparent);
      pointer-events: none;
    }

    .note-toolbar {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 10%, transparent);
    }

    .tool-btn {
      font: inherit;
      font-size: 0.85rem;
      background: none;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 4px;
      color: CanvasText;
      cursor: pointer;
      padding: 0.3rem 0.7rem;
      min-height: 36px;
      touch-action: manipulation;
    }

    .tool-btn:hover { background: color-mix(in srgb, CanvasText 6%, transparent); }
    .tool-btn.recording { border-color: red; color: red; }
    .tool-btn:disabled { opacity: 0.4; cursor: default; }

    .save-status {
      position: fixed;
      bottom: 1rem;
      right: 1.25rem;
      font-size: 0.75rem;
      color: color-mix(in srgb, CanvasText 40%, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-status.visible { opacity: 1; }

    #voice-status {
      font-size: 0.8rem;
      padding: 0.4rem 1.25rem;
      color: color-mix(in srgb, CanvasText 55%, transparent);
      min-height: 1.6em;
    }
  </style>
  <script src="/sw-toast.js" defer></script>
</head>
<body>

<header>
  <nav class="breadcrumb" id="breadcrumb" aria-label="Location"></nav>
</header>

<div class="note-toolbar">
  <button class="tool-btn" id="btn-mic" type="button" title="Append voice">&#127908; Append voice</button>
  <button class="tool-btn" id="btn-ai-edit" type="button" title="AI edit">&#129302; AI edit</button>
</div>
<div id="voice-status"></div>

<div class="note-container">
  <h1 class="note-title" id="note-title" contenteditable="true" data-placeholder="Untitled" spellcheck="true"></h1>
  <div class="note-body" id="note-body" contenteditable="true" data-placeholder="Start writing..." spellcheck="true"></div>
</div>

<div class="save-status" id="save-status">Saved</div>

<script type="module" src="/inkwell/note.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/inkwell/sw.js');</script>
</body>
</html>
